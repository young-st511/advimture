scenarios:
  - id: incident-hotfix-001-scenario
    status: approved
    exercise_id: incident-hotfix-001
    engine_support: implemented
    learning_reinforcement: "검색으로 원인 토큰을 즉시 찾는다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "원인 error 위치 추적"
    briefing: "복구 콘솔이 error 토큰을 감지했습니다. /error로 원인 위치를 바로 잡으세요."
    context_role: "remote-operator"
    mentor_success: "좋습니다. 한 줄씩 훑지 않고 error 위치를 바로 잡았습니다."
    mentor_failure: "검색을 사용해야 원인 토큰을 빠르게 고정할 수 있습니다."

  - id: incident-hotfix-002-scenario
    status: approved
    exercise_id: incident-hotfix-002
    engine_support: implemented
    learning_reinforcement: "n으로 같은 검색어의 다음 match를 따라간다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "다음 timeout 추적"
    briefing: "timeout이 한 번 더 튀었습니다. 같은 검색어를 다시 치지 말고 n으로 다음 위치를 추적하세요."
    context_role: "remote-operator"
    mentor_success: "좋습니다. n으로 같은 신호의 다음 발생을 따라갔습니다."
    mentor_failure: "같은 검색어의 다음 match는 n으로 이동합니다."

  - id: incident-hotfix-003-scenario
    status: approved
    exercise_id: incident-hotfix-003
    engine_support: implemented
    learning_reinforcement: "ciw로 값 전체를 구조적으로 교체한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "상태 값 핫픽스"
    briefing: "상태 값 down이 설비를 막고 있습니다. ciw로 값 전체를 up으로 교체하세요."
    context_role: "remote-operator"
    mentor_success: "좋습니다. 값 중간에서도 ciw로 전체 상태값을 안전하게 교체했습니다."
    mentor_failure: "값의 시작으로 이동하지 말고 현재 단어 전체를 대상으로 잡으세요."

  - id: incident-hotfix-004-scenario
    status: approved
    exercise_id: incident-hotfix-004
    engine_support: implemented
    learning_reinforcement: "o로 현재 줄 아래에 보정 줄을 추가한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "guard 줄 추가"
    briefing: "핫픽스가 풀리지 않도록 guard 줄이 필요합니다. 현재 줄 아래에 guard=on을 추가하세요."
    context_role: "remote-operator"
    mentor_success: "좋습니다. 기존 줄을 건드리지 않고 아래에 guard를 열었습니다."
    mentor_failure: "기존 줄 끝에 붙이지 말고 o로 새 줄을 여세요."

  - id: incident-hotfix-005-scenario
    status: approved
    exercise_id: incident-hotfix-005
    engine_support: implemented
    learning_reinforcement: "yy/p로 안전한 설정 줄을 재사용한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "안정 route 복제"
    briefing: "검증된 route 줄을 하나 더 만들어야 합니다. 다시 치지 말고 yy와 p로 복제하세요."
    context_role: "remote-operator"
    mentor_success: "좋습니다. 정상 route를 재입력하지 않고 안전하게 복제했습니다."
    mentor_failure: "정상 줄은 다시 타이핑하지 말고 register에 담아 붙여넣으세요."

  - id: incident-hotfix-006-scenario
    status: approved
    exercise_id: incident-hotfix-006
    engine_support: implemented
    learning_reinforcement: "range substitute로 문제 구간만 바꾼다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "문제 구간 치환"
    briefing: "첫 줄은 원인 기록이라 남겨야 합니다. 2~3번째 줄의 error만 ok로 바꾸세요."
    context_role: "remote-operator"
    mentor_success: "좋습니다. 전체 파일이 아니라 문제 구간만 정확히 치환했습니다."
    mentor_failure: "첫 줄까지 바꾸면 원인 기록이 사라집니다. range를 붙이세요."
