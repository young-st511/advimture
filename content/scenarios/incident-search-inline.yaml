scenarios:
  - id: incident-search-inline-001-scenario
    status: approved
    exercise_id: incident-search-inline-001
    engine_support: implemented
    learning_reinforcement: "검색 결과가 여러 개일 때 정상 match를 건너뛰고 다음 손상 match로 이동한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "활성 target match 고정"
    briefing: "릴레이 기지 009의 archive target은 정상이고 다음 target만 손상됐습니다. 첫 match를 고정한 뒤 실제 손상 match로 이동하세요."
    context_role: "검색 기반 target triage"
    mentor_success: "좋습니다. 정상 archive target을 건너뛰고 손상 target 위치만 고정했습니다."
    mentor_failure: "첫 target은 정상 archive입니다. 같은 검색어를 다시 치지 말고 n으로 다음 target match를 따라가세요."
    story_constraints:
      - "검색 반복 판단을 inline repair 전 단계로 분리한다."

  - id: incident-search-inline-002-scenario
    status: approved
    exercise_id: incident-search-inline-002
    engine_support: implemented
    learning_reinforcement: "delimiter를 보존해야 하는 inline 값은 ct,로 comma 앞까지만 교체한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "target delimiter 보존 수리"
    briefing: "node 값의 target 부분만 손상됐고 comma 뒤 route는 정상입니다. comma 앞 손상 값만 stable로 교체하세요."
    context_role: "inline target 재배선"
    mentor_success: "좋습니다. delimiter를 보존하고 손상 값만 stable로 교체했습니다."
    mentor_failure: "comma 뒤 route는 정상입니다. f가 아니라 t, 범위로 delimiter 앞까지만 고치세요."
    story_constraints:
      - "ct, 선택 이유를 delimiter 보존으로 설명한다."
