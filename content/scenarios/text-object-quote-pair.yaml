scenarios:
  - id: text-object-quote-pair-001-scenario
    status: approved
    exercise_id: text-object-quote-pair-001
    engine_support: implemented
    learning_reinforcement: "ci\"는 quote 문자는 남기고 내부 값 전체를 교체한다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "상태 문자열 복구"
    briefing: "status 문자열 값이 down으로 떨어졌습니다. quote 내부 어디에 있든 ci\"로 값 전체를 up으로 교체하세요."
    context_role: "quoted 상태 설정"
    mentor_success: "좋습니다. quote 구조는 유지하고 내부 값만 교체했습니다."
    mentor_failure: "단어만 바꾸는 ciw가 아닙니다. 이번 대상은 double quote 내부 전체입니다."
    story_constraints:
      - "quote 문자를 지우지 않는다는 점을 강조한다."
      - "시나리오는 target state와 constraints를 바꾸지 않는다."

  - id: text-object-quote-pair-002-scenario
    status: approved
    exercise_id: text-object-quote-pair-002
    engine_support: implemented
    learning_reinforcement: "di\"는 double quote 내부 값만 삭제하고 Normal mode를 유지한다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "민감 토큰 비우기"
    briefing: "임시 토큰 DELETE를 빈 문자열로 격리해야 합니다. quote는 남기고 내부 값만 di\"로 비우세요."
    context_role: "민감 값이 남은 설정"
    mentor_success: "좋습니다. token 구조는 유지한 채 내부 값만 비웠습니다."
    mentor_failure: "따옴표까지 없애면 설정 구조가 깨집니다. di\"로 내부만 제거하세요."
    story_constraints:
      - "삭제 범위가 quote 내부라는 점을 강화한다."
      - "줄 전체 삭제나 문자 반복 삭제를 유도하지 않는다."

  - id: text-object-quote-pair-003-scenario
    status: approved
    exercise_id: text-object-quote-pair-003
    engine_support: implemented
    learning_reinforcement: "yi\"는 quote 내부 값만 register에 담아 재사용한다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "비밀 값 미러링"
    briefing: "secret의 alpha 값을 mirror에도 넣어야 합니다. yi\"로 내부 값만 복사해 닫는 quote 앞에 붙이세요."
    context_role: "동기화가 필요한 quoted 값"
    mentor_success: "좋습니다. 값을 다시 치지 않고 quote 내부 값만 재사용했습니다."
    mentor_failure: "수동 입력하지 마세요. yi\"로 내부 값만 담아 P로 quote 안에 넣습니다."
    story_constraints:
      - "복사 대상이 quote 내부 값이라는 점을 강조한다."
      - "P를 쓰는 위치는 닫는 quote 앞이다."

  - id: text-object-quote-pair-004-scenario
    status: approved
    exercise_id: text-object-quote-pair-004
    engine_support: implemented
    learning_reinforcement: "ci\" 변경은 esc 이후 .으로 반복할 수 있다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "반복 값 교체"
    briefing: "두 설정 줄의 old 값을 모두 new로 바꿔야 합니다. 첫 줄은 ci\"로, 다음 줄은 .으로 같은 변경을 반복하세요."
    context_role: "반복 수정이 필요한 quoted 설정"
    mentor_success: "좋습니다. 구조 대상 편집과 반복 변경을 함께 사용했습니다."
    mentor_failure: "두 번째 줄에서 다시 타이핑하지 마세요. 커서를 값 안에 두고 .으로 반복합니다."
    story_constraints:
      - "반복 학습은 dot repeat 체감을 위한 보조 목표다."
      - "새 text object command 학습을 가리지 않는다."

