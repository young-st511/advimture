    context_role: "서비스 라우팅 설정"
    mentor_success: "좋습니다. b를 쓰면 지나친 단어도 빠르게 다시 잡을 수 있습니다."
    mentor_failure: "지금 목표는 이전 단어 시작점입니다. b로 backend까지 되돌아가보세요."
