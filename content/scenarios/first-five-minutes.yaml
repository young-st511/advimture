    mission_title: "경고 줄 찾기"
    briefing: "부팅 로그에서 경고가 난 줄로 이동해야 합니다. 아래 줄로 내려가 WARN 표시를 확인하세요."
    context_role: "짧은 시스템 로그"
    mentor_success: "좋습니다. 위아래 이동을 써서 필요한 줄을 잡았습니다."
