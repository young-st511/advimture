scenarios:
  - id: command-choice-scope-001-scenario
    status: approved
    exercise_id: command-choice-scope-001
    engine_support: implemented
    learning_reinforcement: "복구 대상의 범위를 먼저 판단하고, 줄 묶음이면 linewise visual selection을 선택한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "줄 묶음 복구 범위 판별"
    briefing: "안전한 route 값 사이에 quarantine 블록 두 줄이 끼어 있습니다. 값/단어를 고치지 말고 복구 범위를 먼저 판단해 줄 묶음만 제거하세요."
    context_role: "scope choice drill"
    mentor_success: "줄 묶음이 복구 범위라는 판단으로 정상 route 값은 그대로 두고 quarantine 블록만 격리했습니다."
    mentor_failure: "이번 복구 범위는 글자나 단어가 아니라 연속된 줄 묶음입니다. 먼저 대상 범위를 판단한 뒤 줄 단위 선택을 고르세요."
    story_constraints:
      - "새 command 소개가 아니라 이미 배운 command 중 범위 선택 판단을 강화한다."
      - "성공/실패 피드백은 key sequence보다 선택 이유를 설명한다."

  - id: command-choice-repeat-substitute-001-scenario
    status: approved
    exercise_id: command-choice-repeat-substitute-001
    engine_support: implemented
    learning_reinforcement: "같은 literal이 파일 전체에 반복되면 수동 반복보다 전체 범위 substitute를 선택한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "반복 수정과 전체 치환 판별"
    briefing: "동일한 stale 상태가 파일 전체와 한 줄 안에 반복됩니다. 점 반복이나 현재 줄 치환으로 한 군데씩 고치지 말고 전체 범위 치환을 선택하세요."
    context_role: "range choice drill"
    mentor_success: "파일 전체에 반복된 literal이므로 한 군데씩 고치지 않고 전체 범위 치환으로 stale 상태를 모두 fresh로 승격했습니다."
    mentor_failure: "이번 복구는 같은 수정을 반복하는 문제가 아닙니다. 파일 전체에 반복된 literal이면 % range로 전체 치환을 선택하세요."
    story_constraints:
      - "새 command 소개가 아니라 이미 배운 substitute 범위 판단을 강화한다."
      - "성공/실패 피드백은 반복 수정과 전체 치환의 선택 이유를 설명한다."

  - id: command-choice-inline-target-001-scenario
    status: approved
    exercise_id: command-choice-inline-target-001
    engine_support: implemented
    learning_reinforcement: "delimiter를 보존해야 하는 hyphenated 값 교체에는 target 직전까지 바꾸는 ct,를 선택한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "inline target 범위 판별"
    briefing: "target 값은 손상됐지만 comma 뒤 route는 정상입니다. comma를 지우지 말고 앞쪽 hyphenated 값만 stable로 교체하세요."
    context_role: "inline target choice drill"
    mentor_success: "delimiter를 보존해야 하므로 comma 직전까지만 바꾸는 범위를 선택했습니다."
    mentor_failure: "comma 뒤 route는 정상입니다. delimiter를 지우지 않도록 t,로 target 직전까지만 change하세요."
    story_constraints:
      - "새 command 소개가 아니라 f/t 범위 선택 판단을 강화한다."
      - "성공/실패 피드백은 ct,와 cf,의 선택 이유를 설명한다."

  - id: command-choice-quote-reuse-001-scenario
    status: approved
    exercise_id: command-choice-quote-reuse-001
    engine_support: implemented
    learning_reinforcement: "검증된 quote 내부 값은 직접 재입력하지 않고 yi\" + P로 재사용한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "quote 값 재사용 판단"
    briefing: "primary token은 이미 검증됐고 mirror는 비어 있습니다. 값을 다시 치지 말고 quote 내부 값만 재사용하세요."
    context_role: "quote value reuse choice drill"
    mentor_success: "검증된 quote 내부 값을 재사용해 token 오타 리스크를 줄이고 mirror 구조를 보존했습니다."
    mentor_failure: "이번 문제는 새 값을 만드는 게 아닙니다. primary의 quote 내부 값을 y로 담아 mirror의 빈 quote 안에 붙이세요."
    story_constraints:
      - "새 command 소개가 아니라 직접 재입력과 reuse의 선택 이유를 강조한다."
      - "성공/실패 피드백은 token 오타 리스크와 구조 보존을 설명한다."

  - id: command-choice-repeat-change-001-scenario
    status: approved
    exercise_id: command-choice-repeat-change-001
    engine_support: implemented
    learning_reinforcement: "같은 단어 교체가 바로 이어질 때 두 번째 교체는 재입력하지 않고 .으로 마지막 변경을 반복한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "반복 변경 재사용 판단"
    briefing: "route와 probe 값이 같은 stale 상태로 남아 있습니다. 첫 변경을 만든 뒤 두 번째 줄에서는 값을 다시 치지 말고 마지막 변경을 반복하세요."
    context_role: "repeat change reuse choice drill"
    mentor_success: "같은 단어 교체 패턴이 이어지므로 두 번째 복구는 값을 다시 입력하지 않고 마지막 변경을 반복했습니다."
    mentor_failure: "이번 문제는 값을 두 번 입력하는 문제가 아닙니다. 첫 ciw 변경을 만든 뒤 다음 줄에서는 마지막 변경을 반복하세요."
    story_constraints:
      - "새 command 소개가 아니라 같은 변경 반복과 직접 재입력의 선택 이유를 강조한다."
      - "성공/실패 피드백은 repeat-last-change가 적합한 패턴을 설명한다."

  - id: command-choice-line-reuse-001-scenario
    status: approved
    exercise_id: command-choice-line-reuse-001
    engine_support: implemented
    learning_reinforcement: "검증된 줄 전체는 직접 재입력하지 않고 linewise yank/put으로 재사용한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "줄 전체 재사용 판단"
    briefing: "릴레이 backup 아래에 검증된 route 줄을 그대로 남겨야 합니다. 값만 다시 치지 말고 줄 전체를 재사용할지 판단하세요."
    context_role: "line reuse choice drill"
    mentor_success: "검증된 route 줄 전체가 재사용 단위이므로 다시 입력하지 않고 backup 아래에 linewise로 남겼습니다."
    mentor_failure: "이번 대상은 단어/quote 값이 아니라 검증된 줄 전체입니다. 줄 단위로 담은 뒤 backup 위치 아래에 붙이세요."
    story_constraints:
      - "새 command 소개가 아니라 직접 재입력과 linewise reuse의 선택 이유를 강조한다."
      - "성공/실패 피드백은 줄 전체가 재사용 단위인 이유를 설명한다."
