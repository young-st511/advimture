scenarios:
  - id: command-choice-scope-001-scenario
    status: approved
    exercise_id: command-choice-scope-001
    engine_support: implemented
    learning_reinforcement: "복구 대상의 범위를 먼저 판단하고, 줄 묶음이면 linewise visual selection을 선택한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "줄 묶음 복구 범위 판별"
    briefing: "안전한 route 값 사이에 quarantine 블록 두 줄이 끼어 있습니다. 값/단어를 고치지 말고 복구 범위를 먼저 판단해 줄 묶음만 제거하세요."
    context_role: "scope choice drill"
    mentor_success: "좋습니다. 정상 route 값은 그대로 두고, quarantine 줄 묶음만 복구 범위로 판단해 격리했습니다."
    mentor_failure: "이번 복구 범위는 글자나 단어가 아니라 연속된 줄 묶음입니다. 먼저 대상 범위를 판단한 뒤 줄 단위 선택을 고르세요."
    story_constraints:
      - "새 command 소개가 아니라 이미 배운 command 중 범위 선택 판단을 강화한다."
      - "성공/실패 피드백은 key sequence보다 선택 이유를 설명한다."

  - id: command-choice-repeat-substitute-001-scenario
    status: approved
    exercise_id: command-choice-repeat-substitute-001
    engine_support: implemented
    learning_reinforcement: "같은 literal이 파일 전체에 반복되면 수동 반복보다 전체 범위 substitute를 선택한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "반복 수정과 전체 치환 판별"
    briefing: "동일한 stale 상태가 파일 전체와 한 줄 안에 반복됩니다. 점 반복이나 현재 줄 치환으로 한 군데씩 고치지 말고 전체 범위 치환을 선택하세요."
    context_role: "range choice drill"
    mentor_success: "좋습니다. 반복 수정 대신 전체 파일 범위 치환을 선택해 모든 stale 상태를 fresh로 승격했습니다."
    mentor_failure: "이번 복구는 같은 수정을 반복하는 문제가 아닙니다. 파일 전체에 반복된 literal이면 % range로 전체 치환을 선택하세요."
    story_constraints:
      - "새 command 소개가 아니라 이미 배운 substitute 범위 판단을 강화한다."
      - "성공/실패 피드백은 반복 수정과 전체 치환의 선택 이유를 설명한다."

  - id: command-choice-inline-target-001-scenario
    status: approved
    exercise_id: command-choice-inline-target-001
    engine_support: implemented
    learning_reinforcement: "delimiter를 보존해야 하는 hyphenated 값 교체에는 target 직전까지 바꾸는 ct,를 선택한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "inline target 범위 판별"
    briefing: "target 값은 손상됐지만 comma 뒤 route는 정상입니다. comma를 지우지 말고 앞쪽 hyphenated 값만 stable로 교체하세요."
    context_role: "inline target choice drill"
    mentor_success: "좋습니다. comma를 보존해야 한다는 조건을 보고 cf,가 아니라 ct,를 선택했습니다."
    mentor_failure: "comma 뒤 route는 정상입니다. delimiter를 지우지 않도록 t,로 target 직전까지만 change하세요."
    story_constraints:
      - "새 command 소개가 아니라 f/t 범위 선택 판단을 강화한다."
      - "성공/실패 피드백은 ct,와 cf,의 선택 이유를 설명한다."
