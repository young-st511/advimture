scenarios:
  - id: search-basic-001-scenario
    status: approved
    exercise_id: search-basic-001
    engine_support: implemented
    learning_reinforcement: "/query enter는 literal token 위치로 이동한다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "error 토큰 추적"
    briefing: "부팅 로그 아래쪽에 error가 숨어 있습니다. /error로 바로 찾아가세요."
    context_role: "장애 로그 탐색"
    mentor_success: "좋습니다. 긴 로그를 이동으로 훑지 않고 검색으로 바로 찾았습니다."
    mentor_failure: "한 줄씩 내려가지 마세요. /error 입력 후 enter로 검색합니다."
    story_constraints:
      - "검색이 이동보다 빠른 상황을 보여준다."
      - "?는 힌트 키이므로 search 문항에서 사용하지 않는다."

  - id: search-basic-002-scenario
    status: approved
    exercise_id: search-basic-002
    engine_support: implemented
    learning_reinforcement: "n은 마지막 검색어의 다음 match로 이동한다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "다음 timeout 추적"
    briefing: "timeout이 두 번 보입니다. 첫 검색 후 n으로 다음 timeout까지 이동하세요."
    context_role: "반복 오류 추적"
    mentor_success: "좋습니다. 같은 검색어는 다시 입력하지 않고 n으로 다음 match를 찾았습니다."
    mentor_failure: "검색어를 다시 치지 마세요. 다음 match는 n입니다."
    story_constraints:
      - "n 반복 이동의 효율을 강조한다."
      - "수동 이동 우회를 금지한다."

  - id: search-basic-003-scenario
    status: approved
    exercise_id: search-basic-003
    engine_support: implemented
    learning_reinforcement: "N은 마지막 검색 방향의 반대로 이전 match에 이동한다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "retry 위치 되돌리기"
    briefing: "첫 retry 안쪽에 커서가 있습니다. /retry로 다음 match를 찾은 뒤 N으로 이전 retry에 돌아오세요."
    context_role: "지나친 검색 결과 복구"
    mentor_success: "좋습니다. N으로 검색 방향을 뒤집어 이전 match로 돌아왔습니다."
    mentor_failure: "이전 검색 결과는 다시 검색하지 말고 N으로 되돌립니다."
    story_constraints:
      - "n과 N의 방향 차이를 명확히 한다."
      - "세계관보다 키 의미를 우선한다."

  - id: search-basic-004-scenario
    status: approved
    exercise_id: search-basic-004
    engine_support: implemented
    learning_reinforcement: "검색은 문서 끝에서 처음으로 wrap-around될 수 있다."
    does_not_change: ["target_state", "optimal_keys", "allowed_keys", "constraints"]
    mission_title: "위쪽 alarm 회수"
    briefing: "커서는 파일 끝에 있지만 alarm은 위에 있습니다. /alarm으로 wrap 검색하세요."
    context_role: "상단 경보 위치 확인"
    mentor_success: "좋습니다. 검색이 문서 위쪽으로 wrap되어 alarm을 찾았습니다."
    mentor_failure: "위로 여러 번 이동하지 마세요. /alarm 검색으로 바로 이동합니다."
    story_constraints:
      - "wrap-around search를 짧게 체감하게 한다."
      - "검색 결과는 cursor 위치로 검증한다."
