scenarios:
  - id: incident-reuse-001-scenario
    status: approved
    exercise_id: incident-reuse-001
    engine_support: implemented
    learning_reinforcement: "검증된 quote 내부 값은 다시 입력하지 않고 text object yank와 before-put으로 재사용한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "quote 검증값 복제"
    briefing: "릴레이 기지 010은 검증된 primary 값을 mirror에도 실어야 합니다. 값을 다시 치지 말고 quote 내부 값만 복사해 닫는 quote 앞에 넣으세요."
    context_role: "검증값 재사용"
    mentor_success: "좋습니다. 검증된 quote 값을 다시 치지 않고 mirror에 재사용했습니다."
    mentor_failure: "값을 직접 입력하면 검증된 원본과 달라질 수 있습니다. quote 내부 값만 yi\"로 담고 mirror 안에 P로 넣으세요."
    story_constraints:
      - "재입력보다 register 재사용이 안전한 이유를 먼저 설명한다."

  - id: incident-reuse-002-scenario
    status: approved
    exercise_id: incident-reuse-002
    engine_support: implemented
    learning_reinforcement: "검증된 줄 전체는 linewise yank와 put으로 재입력 없이 복제한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "guard 줄 전체 복제"
    briefing: "guard 줄 전체가 검증됐고 같은 줄을 backup 앞에 하나 더 남겨야 합니다. 줄을 다시 입력하지 말고 linewise register로 아래에 복제하세요."
    context_role: "줄 전체 재사용"
    mentor_success: "좋습니다. 검증된 줄 전체를 linewise register로 재사용했습니다."
    mentor_failure: "이번 대상은 값 일부가 아니라 줄 전체입니다. 직접 입력하지 말고 yy로 줄 전체를 담은 뒤 p로 아래에 복제하세요."
    story_constraints:
      - "줄 전체 재사용 판단을 quote 값 재사용 다음 단계로 연결한다."
