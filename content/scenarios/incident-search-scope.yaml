scenarios:
  - id: incident-search-scope-001-scenario
    status: approved
    exercise_id: incident-search-scope-001
    engine_support: implemented
    learning_reinforcement: "먼저 / 검색으로 marker를 찾고, 도착한 위치에서 줄 묶음 scope를 판단해 linewise로 격리한다."
    does_not_change: ["target_state", "optimal_keys", "constraints"]
    mission_title: "표식 기반 줄 묶음 격리"
    briefing: "breach 표식 아래 두 줄이 relay route를 막고 있습니다. 표식 위치를 먼저 고정한 뒤 줄 묶음 범위를 판단해 격리하세요."
    context_role: "표식으로만 찾을 수 있는 격리 블록"
    mentor_success: "검색으로 표식을 찾은 뒤 줄 묶음 범위를 판단해 격리했습니다."
    mentor_failure: "이번 복구는 훑어보기나 단어 삭제가 아닙니다. /breach로 위치를 확정한 뒤 linewise 범위를 잡으세요."
    story_constraints:
      - "검색이 scope 판단의 진입점임을 강조한다."
      - "success/failure copy는 key sequence보다 search-then-scope 선택 이유를 설명한다."
