exercises:
  - id: incident-search-inline-001
    status: approved
    command_cluster: search-basic
    engine_support: implemented
    trained_commands: []
    reviewed_commands: ["/", "n", "enter"]
    mistake_focus: ["첫 target match만 보고 archive 줄을 고치려 한다."]
    replay_status: pass
    title: "활성 target match 고정"
    goal_for_player: "/target으로 첫 match를 잡고 n으로 실제 손상 target까지 이동하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 0
      buffer: |
        seed target=archive,route=safe
        node=target-bad,route=live
        guard=on
    target_state:
      mode: normal
      cursor:
        row: 1
        col: 5
      buffer: |
        seed target=archive,route=safe
        node=target-bad,route=live
        guard=on
    optimal_keys: ["/", "t", "a", "r", "g", "e", "t", "enter", "n"]
    allowed_keys: ["/", "t", "a", "r", "g", "e", "enter", "n", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 9
      required_keys: ["/", "enter", "n"]
      forbidden_keys: ["h", "j", "k", "l", "w", "0", "$", "?", ":", "d", "x", "c", "i", "A", "o", "O", "v", "V", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "첫 target은 archive라 정상입니다. 같은 검색어의 다음 match를 따라가야 합니다."
      - after_keys: 8
        text: "첫 target에 도착했다면 n으로 다음 target match까지 이동하세요."
    grading:
      pass_condition: "cursor == target && mode == normal"
      optimal_key_count: 9
    e2e_assertions:
      buffer: ["seed target=archive,route=safe", "node=target-bad,route=live", "guard=on"]
      cursor:
        row: 1
        col: 5
      mode: normal
      status: succeeded

  - id: incident-search-inline-002
    status: approved
    command_cluster: char-find-line
    engine_support: implemented
    trained_commands: []
    reviewed_commands: ["ct", "esc"]
    mistake_focus: ["comma delimiter와 route 값을 함께 지우거나 다시 타이핑하려 한다."]
    replay_status: pass
    title: "target 값 delimiter 보존 수리"
    goal_for_player: "target 값 시작에서 ct,로 comma 앞 손상 값만 stable로 교체하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 5
      buffer: |
        node=target-bad,route=live
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 11
      buffer: |
        node=stable,route=live
    optimal_keys: ["c", "t", ",", "s", "t", "a", "b", "l", "e", "esc"]
    allowed_keys: ["c", "t", ",", "s", "a", "b", "l", "e", "esc"]
    forbidden_keys: ["f", "left", "right", "up", "down"]
    constraints:
      max_inputs: 10
      required_keys: ["c", "t", "esc"]
      forbidden_keys: ["f", "h", "j", "k", "w", "0", "$", "/", "?", ":", "d", "x", "r", "i", "A", "o", "O", "v", "V", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 2
        text: "comma 뒤 route는 정상입니다. ct,로 comma 앞 값만 change하세요."
      - after_keys: 9
        text: "stable 입력 후 esc로 Normal mode에 돌아오면 delimiter와 route가 보존됩니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 10
    e2e_assertions:
      buffer: ["node=stable,route=live"]
      cursor:
        row: 0
        col: 11
      mode: normal
      status: succeeded
