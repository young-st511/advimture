exercises:
  - id: command-choice-scope-001
    status: approved
    command_cluster: visual-line-basic
    engine_support: implemented
    trained_commands: []
    reviewed_commands: ["V", "j", "d", "ciw", "ci\""]
    mistake_focus: ["단어 하나나 quote 값이 아니라 연속된 줄 묶음이 복구 범위임을 놓친다."]
    replay_status: pass
    title: "복구 범위 판별"
    goal_for_player: "오염된 quarantine 줄 두 개를 줄 단위 범위로 잡아 제거하세요."
    initial_state:
      mode: normal
      cursor:
        row: 1
        col: 0
      buffer: |
        route="safe"
        quarantine=temp
        quarantine=shadow
        route="safe"
    target_state:
      mode: normal
      cursor:
        row: 1
        col: 0
      buffer: |
        route="safe"
        route="safe"
    optimal_keys: ["V", "j", "d"]
    allowed_keys: ["V", "j", "d", "esc"]
    forbidden_keys: ["v", "left", "right", "up", "down"]
    constraints:
      max_inputs: 3
      required_keys: ["V", "d"]
      forbidden_keys: ["v", "h", "k", "l", "w", "b", "e", "0", "$", "x", "r", "c", "y", "p", "P", "i", "a", "A", "o", "O", ":", "/", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "이번 대상은 단어 하나나 따옴표 값이 아니라 줄 두 개입니다. 먼저 줄 단위 범위를 고르세요."
      - after_keys: 2
        text: "quarantine 두 줄이 모두 잡혔다면 d로 블록 전체를 격리합니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 3
    e2e_assertions:
      buffer: ["route=\"safe\"", "route=\"safe\""]
      cursor:
        row: 1
        col: 0
      mode: normal
      status: succeeded
