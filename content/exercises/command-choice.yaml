exercises:
  - id: command-choice-scope-001
    status: approved
    command_cluster: visual-line-basic
    engine_support: implemented
    trained_commands: []
    reviewed_commands: ["V", "j", "d", "ciw", "ci\""]
    mistake_focus: ["단어 하나나 quote 값이 아니라 연속된 줄 묶음이 복구 범위임을 놓친다."]
    replay_status: pass
    title: "줄 묶음 복구 범위 판별"
    goal_for_player: "오염 대상을 보고 값 하나인지 줄 묶음인지 먼저 판단한 뒤, quarantine 블록만 줄 단위로 제거하세요."
    initial_state:
      mode: normal
      cursor:
        row: 1
        col: 0
      buffer: |
        route="safe"
        quarantine=temp
        quarantine=shadow
        route="safe"
    target_state:
      mode: normal
      cursor:
        row: 1
        col: 0
      buffer: |
        route="safe"
        route="safe"
    optimal_keys: ["V", "j", "d"]
    allowed_keys: ["V", "j", "d", "esc"]
    forbidden_keys: ["v", "left", "right", "up", "down"]
    constraints:
      max_inputs: 3
      required_keys: ["V", "d"]
      forbidden_keys: ["v", "h", "k", "l", "w", "b", "e", "0", "$", "x", "r", "c", "y", "p", "P", "i", "a", "A", "o", "O", ":", "/", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "route 값은 정상입니다. 복구 범위는 quarantine 값 하나가 아니라 연속된 quarantine 줄 묶음입니다."
      - after_keys: 2
        text: "두 quarantine 줄이 모두 선택됐는지 확인한 뒤, 줄 묶음 전체를 격리하세요."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 3
    e2e_assertions:
      buffer: ["route=\"safe\"", "route=\"safe\""]
      cursor:
        row: 1
        col: 0
      mode: normal
      status: succeeded

  - id: command-choice-repeat-substitute-001
    status: approved
    command_cluster: vim-ex-command-substitute
    engine_support: implemented
    trained_commands: []
    reviewed_commands: [":%s", ".", ":s"]
    mistake_focus: ["같은 literal이 파일 전체와 한 줄 안에 반복되는데 반복 수정이나 현재 줄 치환으로 접근한다."]
    replay_status: pass
    title: "반복 수정과 전체 치환 판별"
    goal_for_player: "stale가 파일 전체에 반복됩니다. 한 번씩 고치지 말고 전체 범위 치환으로 모두 fresh로 승격하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 0
      buffer: |
        state=stale stale
        route=ok
        state=stale
        state=stale
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 0
      buffer: |
        state=fresh fresh
        route=ok
        state=fresh
        state=fresh
    optimal_keys: [":", "%", "s", "/", "s", "t", "a", "l", "e", "/", "f", "r", "e", "s", "h", "/", "g", "enter"]
    allowed_keys: [":", "%", "s", "/", "t", "a", "l", "e", "f", "r", "h", "g", "enter", "esc"]
    forbidden_keys: [".", "v", "V", "d", "x", "c", "y", "p", "P", "i", "A", "o", "O", "left", "right", "up", "down"]
    constraints:
      max_inputs: 18
      required_keys: [":", "%", "g", "enter"]
      forbidden_keys: [".", "v", "V", "d", "x", "c", "y", "p", "P", "i", "A", "o", "O", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "stale는 한 줄이 아니라 파일 전체에 반복됩니다. 범위 판단은 전체 파일입니다."
      - after_keys: 3
        text: ":%s/old/new/g는 전체 파일의 모든 old를 new로 바꿉니다."
    grading:
      pass_condition: "buffer has no stale && mode == normal"
      optimal_key_count: 18
    e2e_assertions:
      buffer: ["state=fresh fresh", "route=ok", "state=fresh", "state=fresh"]
      cursor:
        row: 0
        col: 0
      mode: normal
      status: succeeded

  - id: command-choice-inline-target-001
    status: approved
    command_cluster: char-find-line
    engine_support: implemented
    trained_commands: []
    reviewed_commands: ["ct", "cf", "cw", "c$"]
    mistake_focus: ["delimiter를 보존해야 하는데 cf,로 comma까지 지우거나 cw로 hyphenated 값 일부만 고친다."]
    replay_status: pass
    title: "delimiter 보존 범위 판별"
    goal_for_player: "route 뒤쪽은 정상입니다. comma 앞 hyphenated 값만 stable로 바꾸고 comma는 보존하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 7
      buffer: |
        target=old-value,route=live
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 13
      buffer: |
        target=stable,route=live
    optimal_keys: ["c", "t", ",", "s", "t", "a", "b", "l", "e", "esc"]
    allowed_keys: ["c", "t", ",", "s", "a", "b", "l", "e", "esc"]
    forbidden_keys: ["f", "left", "right", "up", "down"]
    constraints:
      max_inputs: 10
      required_keys: ["c", "t", "esc"]
      forbidden_keys: ["f", "h", "j", "k", "w", "0", "$", "/", "?", ":", "d", "x", "r", "i", "A", "o", "O", "v", "V", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 2
        text: "comma 뒤 route는 정상입니다. target 문자는 보존해야 하므로 t,로 comma 앞까지만 범위를 잡으세요."
      - after_keys: 9
        text: "stable 입력 후 esc로 Normal mode에 돌아와 복구를 확정합니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 10
    e2e_assertions:
      buffer: ["target=stable,route=live"]
      cursor:
        row: 0
        col: 13
      mode: normal
      status: succeeded

  - id: command-choice-quote-reuse-001
    status: approved
    command_cluster: text-object-quote-pair
    engine_support: implemented
    trained_commands: []
    reviewed_commands: ["yi\"", "P", "i", "ci\""]
    mistake_focus: ["검증된 quote 값을 직접 다시 입력하거나 값 전체가 아니라 단어 일부만 복사한다."]
    replay_status: pass
    title: "quote 값 재사용 판단"
    goal_for_player: "검증된 primary quote 값을 다시 입력하지 말고 mirror quote 안에 그대로 재사용하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 10
      buffer: |
        primary="vault-731"
        mirror=""
    target_state:
      mode: normal
      cursor:
        row: 1
        col: 16
      buffer: |
        primary="vault-731"
        mirror="vault-731"
    optimal_keys: ["y", "i", "\"", "j", "$", "P"]
    allowed_keys: ["y", "i", "\"", "j", "$", "P", "esc"]
    forbidden_keys: ["p", "left", "right", "up", "down"]
    constraints:
      max_inputs: 6
      required_keys: ["y", "i", "\"", "P"]
      forbidden_keys: ["p", "h", "k", "l", "b", "e", "0", "d", "c", "x", "r", "a", "A", "o", "O", ":", "/", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "이번 판단은 값을 새로 입력할지, 이미 검증된 quote 값을 재사용할지입니다."
      - after_keys: 3
        text: "yi\"로 quote 내부 값만 register에 담았습니다. mirror의 닫는 quote 앞에서 P로 붙입니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 6
    e2e_assertions:
      buffer: ["primary=\"vault-731\"", "mirror=\"vault-731\""]
      cursor:
        row: 1
        col: 16
      mode: normal
      status: succeeded
