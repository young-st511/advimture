exercises:
  - id: open-line-edit-001
    status: approved
    command_cluster: open-line-edit
    engine_support: implemented
    trained_commands: ["o"]
    reviewed_commands: ["i", "A", "esc"]
    mistake_focus: ["기존 줄 끝에 붙이거나 아래 줄을 덮어쓰려고 한다."]
    replay_status: pass
    title: "상태 줄 아래에 로그 슬롯 추가"
    goal_for_player: "현재 줄 아래에 o로 새 줄을 열고 log=ok를 입력한 뒤 Normal mode로 돌아오세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 0
      buffer: |
        svc=up
        route=ok
    target_state:
      mode: normal
      cursor:
        row: 1
        col: 5
      buffer: |
        svc=up
        log=ok
        route=ok
    optimal_keys: ["o", "l", "o", "g", "=", "o", "k", "esc"]
    allowed_keys: ["o", "l", "g", "=", "k", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 8
      required_keys: ["o", "esc"]
      forbidden_keys: ["O", "i", "a", "A", ":", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "o는 현재 줄 아래에 빈 줄을 열고 바로 Insert mode로 들어갑니다."
      - after_keys: 7
        text: "값을 다 입력했으면 esc로 Normal mode에 돌아오세요."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 8
    e2e_assertions:
      buffer: ["svc=up", "log=ok", "route=ok"]
      cursor:
        row: 1
        col: 5
      mode: normal
      status: succeeded

