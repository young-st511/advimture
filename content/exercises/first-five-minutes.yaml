  - id: word-motion-basic-001
    status: draft
    command_cluster: word-motion-basic
    engine_support: planned
    trained_commands: ["w"]
    reviewed_commands: ["b", "e"]
    mistake_focus: ["l 반복으로 긴 줄을 이동하려고 한다."]
    replay_status: pending
    title: "단어 시작점으로 뛰어가기"
    goal_for_player: "커서를 backend 단어의 시작으로 이동하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 0
      buffer: |
        service api backend enabled
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 12
    optimal_keys: ["w", "w"]
    allowed_keys: ["h", "j", "k", "l", "w", "b", "e", "esc"]
    forbidden_keys: ["right", "left", "up", "down"]
    hints:
      - after_keys: 1
        text: "한 글자씩 이동하지 말고 단어 단위로 이동해보세요."
      - after_keys: 2
        text: "w는 다음 단어의 시작으로 이동합니다."
    grading:
      pass_condition: "cursor.row == 0 && cursor.col == 12"
      optimal_key_count: 2
