    title: "파일 처음으로 돌아가기"
    goal_for_player: "커서를 파일 첫 줄 첫 칸으로 이동하세요."
    initial_state:
      mode: normal
      cursor:
        row: 2
        col: 4
      buffer: |
        server {
        route api
        error here
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 0
    optimal_keys: ["g", "g"]
    allowed_keys: ["g", "G", "0", "$", "h", "j", "k", "l", "esc"]
    forbidden_keys: ["up", "down", "left", "right"]
    hints:
      - after_keys: 1
        text: "g는 prefix입니다. 한 번 더 g를 눌러 파일 처음으로 이동합니다."
      - after_keys: 2
        text: "gg는 파일의 처음으로 이동합니다."
    grading:
      pass_condition: "cursor.row == 0 && cursor.col == 0"
      optimal_key_count: 2
    e2e_assertions:
      buffer: ["server {", "route api", "error here"]
      cursor:
        row: 0
        col: 0
      mode: normal
      status: succeeded

