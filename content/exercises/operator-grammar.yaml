  - id: change-with-motion-003
    status: approved
    command_cluster: change-with-motion
    engine_support: implemented
    trained_commands: ["cc"]
    reviewed_commands: ["cw", "c$"]
    mistake_focus: ["줄 전체가 손상됐는데 부분 교체로 해결하려고 한다."]
    replay_status: pass
    title: "손상 명령 줄 재작성"
    goal_for_player: "가운데 명령 줄 전체를 rsync --dry-run ok로 다시 작성하고 Normal mode로 돌아오세요."
    initial_state:
      mode: normal
      cursor:
        row: 1
        col: 7
      buffer: |
        job: precheck
        rsync ??? corrupted
        job: report
    target_state:
      mode: normal
      cursor:
        row: 1
        col: 17
      buffer: |
        job: precheck
        rsync --dry-run ok
        job: report
    optimal_keys: ["c", "c", "r", "s", "y", "n", "c", " ", "-", "-", "d", "r", "y", "-", "r", "u", "n", " ", "o", "k", "esc"]
    allowed_keys: ["c", "r", "s", "y", "n", " ", "-", "d", "u", "o", "k", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 21
      required_keys: ["c", "esc"]
      forbidden_keys: ["x", "i", "a", "A", ":", "ctrl+r", "left", "right", "up", "down", "ctrl+c"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "줄 전체가 손상됐습니다. c를 한 번 더 눌러 현재 줄을 교체하세요."
      - after_keys: 2
        text: "cc는 현재 줄을 비우고 바로 Insert mode로 들어갑니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 21
    e2e_assertions:
      buffer: ["job: precheck", "rsync --dry-run ok", "job: report"]
      cursor:
        row: 1
        col: 17
      mode: normal
      status: succeeded
