        col: 7
      buffer: |
        tx: SOS###NOISE###
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 6
      buffer: |
        tx: SOS
    optimal_keys: ["d", "$"]
    allowed_keys: ["d", "$", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 2
      required_keys: ["d", "$"]
      forbidden_keys: ["x", "r", "i", "a", "A", ":", "u", "ctrl+r", "left", "right", "up", "down", "ctrl+c"]
      attempt_limit: 0
    hints:
