  - id: delete-with-motion-003
    status: approved
    command_cluster: delete-with-motion
    engine_support: implemented
    trained_commands: ["dd"]
    reviewed_commands: ["d$"]
    mistake_focus: ["줄 전체 삭제와 줄 끝 삭제를 혼동한다."]
    replay_status: pass
    title: "오염 줄 제거"
    goal_for_player: "배포 큐 중간의 위험한 줄 전체를 제거하세요."
    initial_state:
      mode: normal
      cursor:
        row: 1
        col: 4
      buffer: |
        deploy: stage
        DROP_ALL_CACHE --force
        deploy: verify
    target_state:
      mode: normal
      cursor:
        row: 1
        col: 0
      buffer: |
        deploy: stage
        deploy: verify
    optimal_keys: ["d", "d"]
    allowed_keys: ["d", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 2
      required_keys: ["d"]
      forbidden_keys: ["x", "r", "i", "a", "A", ":", "u", "ctrl+r", "left", "right", "up", "down", "ctrl+c"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "현재 줄 전체가 오염됐습니다. motion 대신 d를 한 번 더 누릅니다."
      - after_keys: 2
        text: "dd는 현재 줄 전체를 삭제합니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 2
    e2e_assertions:
      buffer: ["deploy: stage", "deploy: verify"]
      cursor:
        row: 1
        col: 0
      mode: normal
      status: succeeded

  - id: change-with-motion-001
    status: approved
    command_cluster: change-with-motion
    engine_support: implemented
    trained_commands: ["cw"]
    reviewed_commands: ["dw", "i", "esc"]
    mistake_focus: ["단어 교체를 삭제와 Insert mode 진입으로 나눠서 처리한다."]
    replay_status: pass
    title: "상태 단어 교체"
    goal_for_player: "밸브 상태 단어를 open으로 교체하고 Normal mode로 돌아오세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 6
      buffer: |
        valve closed pressure=nominal
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 11
      buffer: |
        valve open pressure=nominal
    optimal_keys: ["c", "w", "o", "p", "e", "n", " ", "esc"]
    allowed_keys: ["c", "w", "o", "p", "e", "n", " ", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 8
      required_keys: ["c", "w", "esc"]
      forbidden_keys: ["d", "x", "r", "i", "a", "A", ":", "u", "ctrl+r", "left", "right", "up", "down", "ctrl+c"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "c도 d처럼 다음 입력으로 바꿀 범위를 기다립니다."
      - after_keys: 2
        text: "cw는 단어 뒤 공백까지 지우고 Insert mode로 들어갑니다. open 뒤 공백까지 입력하세요."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 8
    e2e_assertions:
      buffer: ["valve open pressure=nominal"]
      cursor:
        row: 0
        col: 11
      mode: normal
      status: succeeded

