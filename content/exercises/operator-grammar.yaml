exercises:
  - id: delete-with-motion-001
    status: approved
    command_cluster: delete-with-motion
    engine_support: implemented
    trained_commands: ["dw"]
    reviewed_commands: ["w", "x"]
    mistake_focus: ["x를 반복해 단어를 지우려고 한다."]
    replay_status: pass
    title: "위험 단어 한 번에 삭제"
    goal_for_player: "냉각 로그에서 잘못 붙은 leak 단어만 제거하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 6
      buffer: |
        ALERT leak valve=ok
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 6
      buffer: |
        ALERT valve=ok
    optimal_keys: ["d", "w"]
    allowed_keys: ["d", "w", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 2
      required_keys: ["d", "w"]
      forbidden_keys: ["x", "r", "i", "a", "A", ":", "u", "ctrl+r", "left", "right", "up", "down", "ctrl+c"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "d는 다음 입력으로 삭제할 범위를 기다립니다."
      - after_keys: 2
        text: "dw는 현재 위치부터 다음 단어 시작 전까지 삭제합니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 2
    e2e_assertions:
      buffer: ["ALERT valve=ok"]
      cursor:
        row: 0
        col: 6
      mode: normal
      status: succeeded

