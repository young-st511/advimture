        text: "줄 전체가 아니라 현재 단어만 대상입니다."
      - after_keys: 2
        text: "i는 여기서 Insert mode가 아니라 inner text object prefix입니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 3
    e2e_assertions:
