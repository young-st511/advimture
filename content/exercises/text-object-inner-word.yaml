      buffer: |
        cmd DROP safe
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 4
      buffer: |
        cmd  safe
    optimal_keys: ["d", "i", "w"]
    allowed_keys: ["d", "i", "w", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 3
      required_keys: ["d", "i", "w"]
      forbidden_keys: ["h", "j", "k", "l", "b", "e", "0", "$", "x", "r", "c", "y", "p", "P", ":", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
