exercises:
  - id: text-object-inner-word-001
    status: approved
    command_cluster: text-object-inner-word
    engine_support: implemented
    trained_commands: ["diw"]
    reviewed_commands: ["dw", "x"]
    mistake_focus: ["단어 시작으로 이동한 뒤 dw를 쓰려고 한다."]
    replay_status: pass
    title: "깨진 값만 제거"
    goal_for_player: "커서가 값 중간에 있습니다. 이동하지 말고 diw로 broken 전체를 제거하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 7
      buffer: |
        mode=broken
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 4
      buffer: |
        mode=
    optimal_keys: ["d", "i", "w"]
    allowed_keys: ["d", "i", "w", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 3
      required_keys: ["d", "i", "w"]
      forbidden_keys: ["h", "j", "k", "l", "b", "e", "0", "$", "x", "r", "c", "y", "p", "P", ":", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "d는 operator입니다. 이번 대상은 motion이 아니라 text object입니다."
      - after_keys: 2
        text: "diw는 현재 단어 내부 전체를 삭제합니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 3
    e2e_assertions:
      buffer: ["mode="]
      cursor:
        row: 0
        col: 4
      mode: normal
      status: succeeded

