exercises:
  - id: char-find-line-001
    status: approved
    command_cluster: char-find-line
    engine_support: implemented
    trained_commands: ["f"]
    reviewed_commands: []
    mistake_focus: ["=까지 l을 반복하거나 / 검색으로 우회하려고 한다."]
    replay_status: pass
    title: "구분자 =로 바로 이동"
    goal_for_player: "route 줄 시작에서 f=로 = 문자 위치까지 바로 이동하세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 0
      buffer: |
        route=primary backup
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 5
      buffer: |
        route=primary backup
    optimal_keys: ["f", "="]
    allowed_keys: ["f", "=", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 2
      required_keys: ["f"]
      forbidden_keys: ["h", "j", "k", "l", "w", "b", "e", "0", "$", "/", "?", ":", "d", "c", "x", "r", "i", "a", "A", "o", "O", "v", "V", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "f는 같은 줄에서 입력한 target 문자 위로 바로 이동합니다. 이번 target은 =입니다."
    grading:
      pass_condition: "cursor == target && mode == normal"
      optimal_key_count: 2
    e2e_assertions:
      buffer: ["route=primary backup"]
      cursor:
        row: 0
        col: 5
      mode: normal
      status: succeeded

