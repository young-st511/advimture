    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 0
      buffer: |
        relay-primary, fallback
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 12
      buffer: |
        relay-primary, fallback
    optimal_keys: ["t", ","]
    allowed_keys: ["t", ",", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 2
      required_keys: ["t"]
      forbidden_keys: ["h", "j", "k", "l", "w", "b", "e", "0", "$", "/", "?", ":", "d", "c", "x", "r", "i", "a", "A", "o", "O", "v", "V", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 1
        text: "t는 target 문자 바로 전까지 이동합니다. comma를 남겨두고 앞 문자에 멈춥니다."
    grading:
      pass_condition: "cursor == target && mode == normal"
      optimal_key_count: 2
    e2e_assertions:
      buffer: ["relay-primary, fallback"]
      cursor:
        row: 0
        col: 12
      mode: normal
      status: succeeded

