  - id: char-find-line-005
    status: approved
    command_cluster: char-find-line
    engine_support: implemented
    trained_commands: ["cf"]
    reviewed_commands: ["c", "f", "esc"]
    mistake_focus: ["값 교체를 x 반복이나 직접 입력 우회로 처리하려고 한다."]
    replay_status: pass
    title: "comma까지 값 교체"
    goal_for_player: "down 값 시작에서 cf,로 comma까지 바꾸고 up을 입력한 뒤 Normal mode로 돌아오세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 7
      buffer: |
        status=down,mode=hold
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 9
      buffer: |
        status=upmode=hold
    optimal_keys: ["c", "f", ",", "u", "p", "esc"]
    allowed_keys: ["c", "f", ",", "u", "p", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 6
      required_keys: ["c", "f", "esc"]
      forbidden_keys: ["h", "j", "k", "l", "w", "b", "e", "0", "$", "/", "?", ":", "d", "x", "r", "a", "A", "o", "O", "v", "V", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 2
        text: "cf,는 comma까지 포함해 change하고 Insert mode로 들어갑니다."
      - after_keys: 5
        text: "값을 입력했다면 esc로 Normal mode에 복귀해야 복구가 확정됩니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 6
    e2e_assertions:
      buffer: ["status=upmode=hold"]
      cursor:
        row: 0
        col: 9
      mode: normal
      status: succeeded

  - id: char-find-line-006
    status: approved
    command_cluster: char-find-line
    engine_support: implemented
    trained_commands: ["ct"]
    reviewed_commands: ["c", "t", "esc"]
    mistake_focus: ["quote를 보존해야 하는데 cf로 quote까지 지우거나 직접 줄을 다시 입력한다."]
    replay_status: pass
    title: "quote 앞까지만 값 교체"
    goal_for_player: "token 값 시작에서 ct\"로 quote 앞까지만 바꾸고 fresh를 입력한 뒤 Normal mode로 돌아오세요."
    initial_state:
      mode: normal
      cursor:
        row: 0
        col: 6
      buffer: |
        token=stale" keep
    target_state:
      mode: normal
      cursor:
        row: 0
        col: 11
      buffer: |
        token=fresh" keep
    optimal_keys: ["c", "t", "\"", "f", "r", "e", "s", "h", "esc"]
    allowed_keys: ["c", "t", "\"", "f", "r", "e", "s", "h", "esc"]
    forbidden_keys: ["left", "right", "up", "down"]
    constraints:
      max_inputs: 9
      required_keys: ["c", "t", "esc"]
      forbidden_keys: ["j", "k", "l", "w", "b", "0", "$", "/", "?", ":", "d", "x", "a", "A", "o", "O", "v", "V", "ctrl+c", "left", "right", "up", "down"]
      attempt_limit: 0
    hints:
      - after_keys: 2
        text: "ct\"는 quote 바로 전까지만 change합니다. quote 자체는 남겨둡니다."
      - after_keys: 8
        text: "fresh 입력 후 esc로 Normal mode에 돌아와야 합니다."
    grading:
      pass_condition: "buffer == target && mode == normal"
      optimal_key_count: 9
    e2e_assertions:
      buffer: ["token=fresh\" keep"]
      cursor:
        row: 0
        col: 11
      mode: normal
      status: succeeded
