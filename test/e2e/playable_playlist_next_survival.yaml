id: playable_playlist_next_survival
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - wait_ms: 200
  - send: "l"
  - wait_ms: 100
  - send: "l"
  - wait_screen_contains: "Next: enter"
  - send: "enter"
  - wait_screen_contains: "부팅 로그에서 WARN 줄을 놓쳤습니다"
  - send: "j"
  - wait_screen_contains: "Next: enter"
  - send: "enter"
  - wait_screen_contains: "표시 지점을 오른쪽으로 지나쳤습니다"
  - send: "h"
  - wait_ms: 50
  - send: "h"
  - wait_screen_contains: "Next: enter"
  - send: "enter"
  - wait_screen_contains: "로그를 한 줄 더 내려가 버렸습니다"
  - send: "k"
  - wait_screen_contains: "Next: enter"
  - send: "enter"
  - wait_screen_contains: "입력 모드에 커서가 묶였습니다"
  - send: "esc"
  - wait_screen_contains: "좋습니다. 터미널에서 당황했을 때 첫 수습은 esc로 Normal mode를 되찾는 것입니다."
  - send: "q"
assert:
  screen_contains:
    - "좋습니다. 터미널에서 당황했을 때 첫 수습은 esc로 Normal mode를 되찾는 것입니다."
    - "Exercise: 5/17"
    - "Grade: S"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
    - "\"normal-motion-basic-002\""
    - "\"normal-motion-basic-003\""
    - "\"normal-motion-basic-004\""
    - "\"survival-save-quit-001\""
  key_trace:
    - "l"
    - "l"
    - "enter"
    - "j"
    - "enter"
    - "h"
    - "h"
    - "enter"
    - "k"
    - "enter"
    - "esc"
    - "q"
  app_state:
    buffer: ["draft"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "survival-save-quit-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
