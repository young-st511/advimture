id: playable_playlist_next_survival
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - wait_ms: 200
  - send: "l"
  - wait_ms: 100
  - send: "l"
  - wait_screen_contains: "Next: enter"
  - send: "enter"
  - wait_screen_contains: "편집 중인 줄에 갇혔습니다"
  - send: "esc"
  - wait_screen_contains: "좋습니다. 당황하면 먼저 esc로 Normal mode에 돌아오면 됩니다."
  - send: "q"
assert:
  screen_contains:
    - "좋습니다. 당황하면 먼저 esc로 Normal mode에 돌아오면 됩니다."
    - "Exercise: 2/14"
    - "Grade: S"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
    - "\"survival-save-quit-001\""
  key_trace:
    - "l"
    - "l"
    - "enter"
    - "esc"
    - "q"
  app_state:
    buffer: ["draft"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "survival-save-quit-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
