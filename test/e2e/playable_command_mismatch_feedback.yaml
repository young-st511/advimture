id: playable_command_mismatch_feedback
command: ["go", "run", "."]
timeout_ms: 15000
terminal:
  width: 100
  height: 30
setup:
  home: temp
  complete_before: survival-save-quit-002
steps:
  - wait_screen_contains: "이 변경은 버려도 되니 저장하지 않고 command-line에서 나가세요"
  - send: ":"
  - wait_screen_contains: "명령 모드"
  - send: "w"
  - wait_ms: 30
  - send: "q"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: "RECOVERY REQUIRED"
  - send: "q"
assert:
  screen_contains:
    - "RECOVERY REQUIRED"
    - "다시 시도: r 또는 enter"
  exit_code: 0
  progress_file_exists: true
  key_trace:
    - ":"
    - "w"
    - "q"
    - "enter"
    - "q"
  app_state:
    mode: "normal"
    status: "failed"
    progress:
      mission_id: "survival-save-quit-002"
      completed: false
    ui:
      focus_panel:
        kind: "failure"
        title: "RECOVERY REQUIRED"
        actions:
          - id: "retry"
            label: "다시 시도: r 또는 enter"
          - id: "quit"
            label: "종료: q"
    contains:
      command_mismatch: ":wq가 아니라 :q!"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_screen_final: true
  save_key_trace: true
  save_summary: true
