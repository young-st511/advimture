id: playable_resume_first_incomplete
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
  progress_file: |
    {
      "tutorials": {},
      "missions": {
        "normal-motion-basic-001": {
          "completed": true,
          "best_grade": "S",
          "best_keystrokes": 2,
          "best_time_ms": 1000,
          "attempts": 1
        }
      },
      "total_keystrokes": 0
    }
steps:
  - wait_screen_contains: "부팅 로그에서 WARN 줄을 놓쳤습니다"
  - send: "j"
  - wait_screen_contains: "좋습니다. j는 아래 줄의 단서를 빠르게 잡을 때 쓰는 기본 이동입니다."
  - send: "q"
assert:
  screen_contains:
    - "Exercise: 2/4"
    - "좋습니다. j는 아래 줄의 단서를 빠르게 잡을 때 쓰는 기본 이동입니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
    - "\"normal-motion-basic-002\""
  key_trace:
    - "j"
    - "q"
  app_state:
    buffer: ["INFO boot", "WARN disk", "INFO done"]
    cursor:
      row: 1
      col: 0
    mode: "normal"
    status: "succeeded"
    progress:
      mission_id: "normal-motion-basic-002"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
