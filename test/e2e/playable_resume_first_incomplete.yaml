id: playable_resume_first_incomplete
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
  progress_file: |
    {
      "tutorials": {},
      "missions": {
        "normal-motion-basic-001": {
          "completed": true,
          "best_grade": "S",
          "best_keystrokes": 2,
          "best_time_ms": 1000,
          "attempts": 1
        }
      },
      "total_keystrokes": 0
    }
steps:
  - wait_screen_contains: "편집 중인 줄에 갇혔습니다"
  - send: "esc"
  - wait_screen_contains: "좋습니다. 당황하면 먼저 esc로 Normal mode에 돌아오면 됩니다."
  - send: "q"
assert:
  screen_contains:
    - "Exercise: 2/14"
    - "좋습니다. 당황하면 먼저 esc로 Normal mode에 돌아오면 됩니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
    - "\"survival-save-quit-001\""
  key_trace:
    - "esc"
    - "q"
  app_state:
    buffer: ["draft"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    status: "succeeded"
    progress:
      mission_id: "survival-save-quit-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
