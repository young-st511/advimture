id: playable_debrief_success
command: ["go", "run", "."]
timeout_ms: 30000
terminal:
  width: 110
  height: 34
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - send: "l"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - wait_screen_contains: "Runbook: 1/4 복구 완료"
  - send: "q"
assert:
  screen_contains:
    - "Grade: S"
    - "이번 복구: grade S, 2 keys"
    - "최단 복구: grade S, 2 keys"
    - "목표 입력: 2 keys"
    - "Runbook: 1/4 복구 완료"
    - "다음 출격: 경고 지점으로 이동하기(미복구) 외 2건 대기"
    - "Next: enter"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
  key_trace:
    - "l"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "normal-motion-basic-001"
      completed: true
    ui:
      focus_panel:
        kind: "success"
        title: "STEP SEALED"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
  save_app_state: true
