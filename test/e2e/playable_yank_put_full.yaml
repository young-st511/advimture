    - "y"
    - "y"
    - "p"
    - "enter"
    - "y"
    - "y"
    - "P"
    - "enter"
    - "y"
    - "w"
    - "w"
    - "P"
    - "enter"
    - "y"
    - "$"
    - "j"
    - "p"
    - "enter"
    - "y"
    - "w"
    - "j"
    - "$"
    - "p"
    - "q"
  app_state:
    buffer: ["id A", "mirror=A"]
    cursor:
      row: 1
      col: 7
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "yank-put-basic-005"
