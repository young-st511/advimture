steps:
  - wait_screen_contains: "정상 라우트 줄을 아래에 한 번 더 복제"
  - send: "y"
  - wait_ms: 50
  - send: "y"
  - wait_ms: 50
  - send: "p"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "backup 라우트를 현재 위치 위에도 배치"
  - send: "y"
  - wait_ms: 50
  - send: "y"
  - wait_ms: 50
  - send: "P"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "api 토큰을 다시 치지 말고 복사"
  - send: "y"
  - wait_ms: 50
  - send: "w"
  - wait_ms: 50
  - send: "w"
  - wait_ms: 50
  - send: "P"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "src의 안전 값 blue를 dst에도 써야 합니다"
  - send: "y"
  - wait_ms: 50
  - send: "$"
  - wait_ms: 50
  - send: "j"
  - wait_ms: 50
  - send: "p"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "ID 토큰 A를 mirror 값으로 옮겨야 합니다"
  - send: "y"
  - wait_ms: 50
  - send: "w"
  - wait_ms: 50
  - send: "j"
  - wait_ms: 50
  - send: "$"
  - wait_ms: 50
  - send: "p"
  - wait_ms: 50
  - wait_screen_contains: "Playlist complete"
  - send: "q"
assert:
  screen_contains:
    - "Mid Tutorial: Yank / put 재사용"
    - "Exercise: 5/5"
    - "Playlist complete"
    - "좋습니다. 작은 토큰도 복사해 붙이면 오타 위험이 줄어듭니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"yank-put-basic-001\""
    - "\"yank-put-basic-002\""
    - "\"yank-put-basic-003\""
    - "\"yank-put-basic-004\""
    - "\"yank-put-basic-005\""
