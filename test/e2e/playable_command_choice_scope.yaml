id: playable_command_choice_scope
command: ["go", "run", "."]
timeout_ms: 30000
terminal:
  width: 120
  height: 38
setup:
  home: temp
  complete_before: command-choice-scope-001
steps:
  - wait_screen_contains: "복구 범위를 먼저 판단"
  - send: "V"
  - wait_screen_contains: "Selection: linewise 1,0 -> 1,14"
  - send: "j"
  - wait_screen_contains: "Selection: linewise 1,0 -> 2,16"
  - send: "d"
  - wait_screen_contains: "Dispatch complete"
  - send: "q"
assert:
  screen_contains:
    - "릴레이 기지 005: 복구 범위 판별"
    - "값/단어를 고치지 말고 복구 범위를 먼저 판단"
    - "quarantine 줄 묶음만 복구 범위로 판단해 격리했습니다."
    - "Dispatch complete"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"command-choice-scope-001\""
  key_trace:
    - "V"
    - "j"
    - "d"
    - "q"
  app_state:
    buffer: ["route=\"safe\"", "route=\"safe\""]
    cursor:
      row: 1
      col: 0
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "command-choice-scope-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
