id: playable_review_queue
command: ["go", "run", "."]
timeout_ms: 10000
terminal:
  width: 110
  height: 34
setup:
  home: temp
steps:
  - wait_screen_contains: "재점검 대상: 목표 문자까지 이동하기: 미복구"
  - send: "l"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - wait_screen_contains: "잔류 리스크: 경고 지점으로 이동하기: 미복구"
  - send: "q"
assert:
  screen_contains:
    - "Tutorial 0: 커서 감각 회상"
    - "재점검 대상: 경고 지점으로 이동하기: 미복구"
    - "오늘의 복구 루트: 3건 대기"
    - "잔류 리스크: 경고 지점으로 이동하기: 미복구"
    - "복구 기록: grade S, 2 keys"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
  key_trace:
    - "l"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "normal-motion-basic-001"
      completed: true
    contains:
      review_count: "\"queue_count\": 3"
      review_primary: "\"primary_exercise_id\": \"normal-motion-basic-002\""
      review_reason: "\"primary_reason\": \"incomplete\""
      daily_route: "\"daily_route\": \"오늘의 복구 루트: 3건 대기\""
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
