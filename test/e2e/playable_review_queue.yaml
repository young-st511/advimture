id: playable_review_queue
command: ["go", "run", "."]
timeout_ms: 10000
terminal:
  width: 110
  height: 34
setup:
  home: temp
steps:
  - wait_screen_contains: "복구 메모: 재점검 3건 · 다음: 목표 문자까지 이동하기"
  - send: "l"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - wait_screen_contains: "잔류 리스크: 경고 지점으로 이동하기: 미복구"
  - send: "q"
assert:
  screen_contains:
    - "Tutorial 0: 커서 감각 회상"
    - "잔류 리스크: 경고 지점으로 이동하기: 미복구"
    - "이번 복구: grade S, 2 keys"
    - "목표 입력: 2 keys"
    - "다음 출격: 경고 지점으로 이동하기(미복구) 외 2건 대기"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
  key_trace:
    - "l"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "normal-motion-basic-001"
      completed: true
    review:
      queue_count: 3
      primary_exercise_id: "normal-motion-basic-002"
      primary_reason: "incomplete"
      daily_route: "오늘의 복구 루트: 경고 지점으로 이동하기(미복구) 외 2건 대기"
    ui:
      focus_panel:
        kind: "success"
        title: "STEP SEALED"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_screen_timeline: true
  save_screen_final: true
  save_key_trace: true
  save_summary: true
  save_app_state: true
  save_progress: true
