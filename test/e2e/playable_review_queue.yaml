id: playable_review_queue
command: ["go", "run", "."]
timeout_ms: 10000
terminal:
  width: 110
  height: 34
setup:
  home: temp
steps:
  - wait_screen_contains: "재진단 큐: 목표 문자까지 이동하기: 미완료"
  - send: "l"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - wait_screen_contains: "잔류 리스크: 경고 지점으로 이동하기: 미완료"
  - send: "q"
assert:
  screen_contains:
    - "Tutorial 0: 커서 감각 회상"
    - "재진단 큐: 경고 지점으로 이동하기: 미완료"
    - "잔류 리스크: 경고 지점으로 이동하기: 미완료"
    - "Debrief: grade S, 2 keys"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
  key_trace:
    - "l"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "normal-motion-basic-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
