id: playable_ctrl_c_does_not_quit
command: ["go", "run", "."]
timeout_ms: 15000
terminal:
  width: 100
  height: 30
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - send: "ctrl+c"
  - wait_ms: 100
  - send: "q"
assert:
  screen_contains:
    - "커서 위치 맞추기"
    - "ACTION"
  exit_code: 0
  progress_file_exists: false
  key_trace:
    - "ctrl+c"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    status: "running"
    progress:
      mission_id: "normal-motion-basic-001"
      completed: false
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
