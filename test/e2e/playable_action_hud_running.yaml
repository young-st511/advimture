id: playable_action_hud_running
command: ["go", "run", "."]
timeout_ms: 15000
terminal:
  width: 80
  height: 24
setup:
  home: temp
steps:
  - wait_screen_contains: "ACTIONS  [?] 힌트 - grade 영향   [q] 종료"
  - send: "q"
assert:
  screen_contains:
    - "MISSION  커서 위치 맞추기"
    - "GOAL     터미널 지도에서 목표 문자까지 커서를 이동하세요."
    - "TOOLS    입력 2/2 · 기억할 명령: l"
    - "SIGNAL"
    - "ACTIONS  [?] 힌트 - grade 영향   [q] 종료"
  exit_code: 0
  progress_file_exists: false
  key_trace:
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    status: "running"
    progress:
      mission_id: "normal-motion-basic-001"
      completed: false
    ui:
      focus_panel:
        kind: "training"
        title: "TRAINING BRIEF"
        actions:
          - id: "hint"
            label: "힌트: ?"
          - id: "quit"
            label: "종료: q"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_app_state: true
  save_summary: true
