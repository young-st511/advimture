id: playable_open_line_forbidden_route
command: ["go", "run", "."]
timeout_ms: 30000
terminal:
  width: 110
  height: 34
setup:
  home: temp
  complete_before: open-line-edit-001
steps:
  - wait_screen_contains: "svc 상태 줄 아래에 로그 슬롯"
  - send: "O"
  - wait_screen_contains: "Retry: r or enter"
  - send: "enter"
  - wait_screen_contains: "svc 상태 줄 아래에 로그 슬롯"
  - send: "o"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - send: "o"
  - wait_ms: 50
  - send: "g"
  - wait_ms: 50
  - send: "="
  - wait_ms: 50
  - send: "o"
  - wait_ms: 50
  - send: "k"
  - wait_ms: 50
  - send: "esc"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "q"
assert:
  screen_contains:
    - "Grade: F"
    - "Retry: r or enter"
    - "좋습니다. o로 아래에 줄을 열고 값을 넣었습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"open-line-edit-001\""
  key_trace:
    - "O"
    - "enter"
    - "o"
    - "l"
    - "o"
    - "g"
    - "="
    - "o"
    - "k"
    - "esc"
    - "q"
  app_state:
    buffer: ["svc=up", "log=ok", "route=ok"]
    cursor:
      row: 1
      col: 5
    mode: "normal"
    status: "succeeded"
    progress:
      mission_id: "open-line-edit-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
