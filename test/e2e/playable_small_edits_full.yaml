id: playable_small_edits_full
command: ["go", "run", "."]
timeout_ms: 25000
terminal:
  width: 100
  height: 32
setup:
  home: temp
  complete_before: single-char-edit-001
steps:
  - wait_screen_contains: "라우트 이름에 i가 하나 더 들어갔습니다"
  - send: "x"
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "api가 apx로 찍혔습니다"
  - send: "r"
  - wait_ms: 50
  - send: "i"
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "가운데 b가 빠졌습니다"
  - send: "i"
  - wait_ms: 50
  - send: "b"
  - wait_ms: 50
  - send: "esc"
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "서비스 이름 ap 뒤에 i가 빠졌습니다"
  - send: "a"
  - wait_ms: 50
  - send: "i"
  - wait_ms: 50
  - send: "esc"
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "배포 체크 줄 끝에 확인 표시가 빠졌습니다"
  - send: "A"
  - wait_ms: 50
  - send: "!"
  - wait_ms: 50
  - send: "esc"
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "잠깐 손이 미끄러져 p를 지워버렸습니다"
  - send: "x"
  - wait_ms: 50
  - send: "u"
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "p를 지우는 판단이 맞았는데 u로 되돌려버렸습니다"
  - send: "x"
  - wait_ms: 50
  - send: "u"
  - wait_ms: 50
  - send: "ctrl+r"
  - wait_screen_contains: "Next tutorial: enter"
  - send: "q"
assert:
  screen_contains:
    - "Tutorial 3: 작은 수정"
    - "Exercise: 7/7"
    - "Next tutorial: enter"
    - "좋습니다. ctrl+r까지 알면 되돌림도 다시 적용도 안전하게 실험할 수 있습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"single-char-edit-001\""
    - "\"single-char-edit-002\""
    - "\"insert-mode-entry-001\""
    - "\"insert-mode-entry-002\""
    - "\"insert-mode-entry-003\""
    - "\"undo-redo-basic-001\""
    - "\"undo-redo-basic-002\""
  key_trace:
    - "x"
    - "enter"
    - "r"
    - "i"
    - "enter"
    - "i"
    - "b"
    - "esc"
    - "enter"
    - "a"
    - "i"
    - "esc"
    - "enter"
    - "A"
    - "!"
    - "esc"
    - "enter"
    - "x"
    - "u"
    - "enter"
    - "x"
    - "u"
    - "ctrl+r"
    - "q"
  app_state:
    buffer: ["ai"]
    cursor:
      row: 0
      col: 1
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "undo-redo-basic-002"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
