id: playable_incident_hint_affordance
command: ["go", "run", "."]
timeout_ms: 15000
terminal:
  width: 80
  height: 24
setup:
  home: temp
  complete_before: incident-hotfix-001
steps:
  - wait_screen_contains: "JUDGMENT"
  - send: "?"
  - wait_screen_contains: "판단 힌트:"
  - send: "?"
  - wait_screen_contains: "참고 명령: /"
  - send: "q"
assert:
  screen_contains:
    - "JUDGMENT"
    - "힌트 내용  판단 힌트:"
    - "힌트 내용  명령 계열 힌트:"
    - "등급에 영향"
    - "참고 명령: /"
    - "ACTIONS  [?] 힌트 - grade 영향   [q] 종료"
  final_screen_contains:
    - "JUDGMENT"
    - "힌트 내용 명령 계열 힌트:"
    - "참고 명령: /"
    - "ACTIONS  [?] 힌트 - grade 영향   [q] 종료"
    - "RUNBOOK CONSOLE"
  final_screen_not_contains:
    - "영향 · ACTIONS"
    - "힌트 내 용"
    - "종료 : q"
  final_screen_max_lines: 24
  exit_code: 0
  progress_file_exists: true
  key_trace:
    - "?"
    - "?"
    - "q"
  app_state:
    mode: "normal"
    status: "running"
    progress:
      mission_id: "incident-hotfix-001"
      completed: false
    ui:
      focus_panel:
        kind: "incident"
        title: "OPERATOR JUDGMENT"
        actions:
          - id: "hint"
            label: "힌트: ?"
          - id: "quit"
            label: "종료: q"
    contains:
      command_memory: "참고 명령: /"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_screen_timeline: true
  save_screen_final: true
  save_key_trace: true
  save_app_state: true
  save_summary: true
