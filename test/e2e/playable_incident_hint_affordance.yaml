id: playable_incident_hint_affordance
command: ["go", "run", "."]
timeout_ms: 15000
terminal:
  width: 80
  height: 24
setup:
  home: temp
  complete_before: incident-hotfix-001
steps:
  - wait_screen_contains: "OPERATOR JUDGMENT"
  - send: "?"
  - wait_screen_contains: "참고 명령: /"
  - send: "q"
assert:
  screen_contains:
    - "OPERATOR JUDGMENT"
    - "판단: 목표 상태를 보고 이미 배운 Vim 동작을 선택하세요."
    - "힌트 내용  복구 작전에서는"
    - "등급에 영향"
    - "원인 신호를"
    - "잡습니다."
    - "참고 명령: /"
    - "보조 행동  힌트: ? · 종료: q"
  final_screen_contains:
    - "OPERATOR JUDGMENT"
    - "RUNBOOK CONSOLE"
    - "보조 행동  힌트: ?"
    - "종료"
  final_screen_not_contains:
    - "영향 · 보조 행동"
  final_screen_max_lines: 24
  exit_code: 0
  progress_file_exists: true
  key_trace:
    - "?"
    - "q"
  app_state:
    mode: "normal"
    status: "running"
    progress:
      mission_id: "incident-hotfix-001"
      completed: false
    ui:
      focus_panel:
        kind: "incident"
        title: "OPERATOR JUDGMENT"
        actions:
          - id: "hint"
            label: "힌트: ?"
          - id: "quit"
            label: "종료: q"
    contains:
      command_memory: "참고 명령: /"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_screen_timeline: true
  save_screen_final: true
  save_key_trace: true
  save_app_state: true
  save_summary: true
