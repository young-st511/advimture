id: playable_substitute_whole_file_paste
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
  complete_before: vim-ex-command-substitute-002
steps:
  - wait_screen_contains: "파일 전체의 TODO를 DONE으로 바꾸세요"
  - send: ":%s/TODO/DONE/g"
  - wait_ms: 100
  - send: "enter"
  - wait_screen_contains: "좋습니다. % range와 g flag를 조합하면 반복된 상태값을 한 번에 정리할 수 있습니다."
  - send: "q"
assert:
  screen_contains:
    - "Mid Tutorial: Ex command 고급 튜토리얼"
    - "Exercise: 2/3"
    - "좋습니다. % range와 g flag를 조합하면 반복된 상태값을 한 번에 정리할 수 있습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"vim-ex-command-substitute-002\""
  key_trace:
    - ":%s/TODO/DONE/g"
    - "enter"
    - "q"
  app_state:
    buffer: ["DONE api", "DONE worker"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    command: ":%s/TODO/DONE/g"
    status: "succeeded"
    progress:
      mission_id: "vim-ex-command-substitute-002"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
