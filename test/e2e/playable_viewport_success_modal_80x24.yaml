id: playable_viewport_success_modal_80x24
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 80
  height: 24
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - send: "l"
  - wait_ms: 50
  - send: "l"
  - wait_screen_contains: "다음 단계: enter"
  - send: "q"
assert:
  screen_contains:
    - "RUNBOOK SEALED"
    - "다음 단계: enter"
    - "Grade: S"
  final_screen_contains:
    - "RUNBOOK CONSOLE"
    - "RUNBOOK SEALED"
    - "다음 단계: enter"
    - "NORMAL · succeeded"
    - "Grade: S"
  final_screen_not_contains:
    - "NORMAL · running"
    - "TRAINING BRIEF"
  final_screen_max_lines: 24
  exit_code: 0
  progress_file_exists: true
  key_trace:
    - "l"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "normal-motion-basic-001"
      completed: true
    ui:
      focus_panel:
        kind: "success"
        title: "STEP SEALED"
        actions:
          - id: "next"
            label: "다음 단계: enter"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_screen_timeline: true
  save_screen_final: true
  save_key_trace: true
  save_app_state: true
  save_summary: true
