id: playable_full_first_five_minute
command: ["go", "run", "."]
timeout_ms: 60000
terminal:
  width: 120
  height: 40
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - wait_ms: 200
  - send: "l"
  - wait_ms: 50
  - send: "l"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "부팅 로그에서 WARN 줄을 놓쳤습니다"
  - wait_ms: 100
  - send: "j"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "표시 지점을 오른쪽으로 지나쳤습니다"
  - wait_ms: 100
  - send: "h"
  - wait_ms: 50
  - send: "h"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "로그를 한 줄 더 내려가 버렸습니다"
  - wait_ms: 100
  - send: "k"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "enter"

  - wait_screen_contains: "입력 모드에 커서가 묶였습니다"
  - wait_ms: 100
  - send: "esc"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "이 변경은 버려도 되니 저장하지 않고 command-line에서 나가세요"
  - send: ":"
  - wait_screen_contains: "명령: 입력 후 enter 실행"
  - wait_ms: 100
  - send: "q"
  - wait_ms: 30
  - send: "!"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: "Command: :q!"
  - send: "enter"

  - wait_screen_contains: "변경을 남긴 채 세션을 닫아야 하니 저장 후 종료하세요"
  - send: ":"
  - wait_screen_contains: "명령: 입력 후 enter 실행"
  - wait_ms: 100
  - send: "w"
  - wait_ms: 30
  - send: "q"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "enter"

  - wait_screen_contains: "라우팅 설정 한 줄에서 backend로 바로 이동해야 합니다"
  - send: "w"
  - wait_ms: 50
  - send: "w"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "enabled까지 지나쳤습니다"
  - send: "b"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "backend 토큰이 정확히 끝나는 지점을 확인해야 합니다"
  - send: "e"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "파일 맨 위 선언부"
  - send: "g"
  - wait_ms: 50
  - send: "g"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "파일 마지막 줄에 현재 상태가 적혀 있습니다"
  - send: "G"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "현재 줄의 키 이름을 다시 확인"
  - send: "0"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "현재 줄의 마지막 토큰 끝을 확인해야 합니다"
  - send: "$"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "enter"

  - wait_screen_contains: "라우트 이름에 i가 하나 더 들어갔습니다"
  - send: "x"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "api가 apx로 찍혔습니다"
  - send: "r"
  - wait_ms: 50
  - send: "i"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "가운데 b가 빠졌습니다"
  - send: "i"
  - wait_ms: 50
  - send: "b"
  - wait_ms: 50
  - send: "esc"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "서비스 이름 ap 뒤에 i가 빠졌습니다"
  - send: "a"
  - wait_ms: 50
  - send: "i"
  - wait_ms: 50
  - send: "esc"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "배포 체크 줄 끝에 확인 표시가 빠졌습니다"
  - send: "A"
  - wait_ms: 50
  - send: "!"
  - wait_ms: 50
  - send: "esc"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "잠깐 손이 미끄러져 p를 지워버렸습니다"
  - send: "x"
  - wait_ms: 50
  - send: "u"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "p를 지우는 판단이 맞았는데 u로 되돌려버렸습니다"
  - send: "x"
  - wait_ms: 50
  - send: "u"
  - wait_ms: 50
  - send: "ctrl+r"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "enter"

  - wait_screen_contains: "현재 줄만 긴급 수정"
  - send: ":"
  - wait_screen_contains: "명령: 입력 후 enter 실행"
  - wait_ms: 100
  - send: "s"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "a"
  - wait_ms: 30
  - send: "p"
  - wait_ms: 30
  - send: "i"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "w"
  - wait_ms: 30
  - send: "e"
  - wait_ms: 30
  - send: "b"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: "Command: :s/api/web/"
  - send: "enter"

  - wait_screen_contains: "파일 전체의 TODO를 DONE으로 바꾸세요"
  - send: ":"
  - wait_screen_contains: "명령: 입력 후 enter 실행"
  - wait_ms: 100
  - send: "%"
  - wait_ms: 30
  - send: "s"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "T"
  - wait_ms: 30
  - send: "O"
  - wait_ms: 30
  - send: "D"
  - wait_ms: 30
  - send: "O"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "D"
  - wait_ms: 30
  - send: "O"
  - wait_ms: 30
  - send: "N"
  - wait_ms: 30
  - send: "E"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "g"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: "Command: :%s/TODO/DONE/g"
  - send: "enter"

  - wait_screen_contains: "2~3번째 줄의 error만 ok로 바꾸세요"
  - send: ":"
  - wait_screen_contains: "명령: 입력 후 enter 실행"
  - wait_ms: 100
  - send: "2"
  - wait_ms: 30
  - send: ","
  - wait_ms: 30
  - send: "3"
  - wait_ms: 30
  - send: "s"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "e"
  - wait_ms: 30
  - send: "r"
  - wait_ms: 30
  - send: "r"
  - wait_ms: 30
  - send: "o"
  - wait_ms: 30
  - send: "r"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "o"
  - wait_ms: 30
  - send: "k"
  - wait_ms: 30
  - send: "/"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "q"
assert:
  screen_contains:
    - "좋습니다. range를 붙이면 필요한 구간만 조심스럽게 고칠 수 있습니다."
    - "Mid Tutorial: Ex command 고급 튜토리얼"
    - "Command: :2,3s/error/ok/"
    - "Exercise: 3/3"
    - "다음 튜토리얼: enter"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
    - "\"normal-motion-basic-002\""
    - "\"normal-motion-basic-003\""
    - "\"normal-motion-basic-004\""
    - "\"survival-save-quit-001\""
    - "\"survival-save-quit-002\""
    - "\"survival-save-quit-003\""
    - "\"word-motion-basic-001\""
    - "\"word-motion-basic-002\""
    - "\"word-motion-basic-003\""
    - "\"whole-file-navigation-001\""
    - "\"whole-file-navigation-002\""
    - "\"whole-file-navigation-003\""
    - "\"whole-file-navigation-004\""
    - "\"single-char-edit-001\""
    - "\"single-char-edit-002\""
    - "\"insert-mode-entry-001\""
    - "\"insert-mode-entry-002\""
    - "\"insert-mode-entry-003\""
    - "\"undo-redo-basic-001\""
    - "\"undo-redo-basic-002\""
    - "\"vim-ex-command-substitute-001\""
    - "\"vim-ex-command-substitute-002\""
    - "\"vim-ex-command-substitute-003\""
  app_state:
    buffer: ["error one", "ok two", "ok three"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    command: ":2,3s/error/ok/"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "vim-ex-command-substitute-003"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
