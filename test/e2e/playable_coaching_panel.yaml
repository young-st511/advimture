id: playable_coaching_panel
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
steps:
  - wait_screen_contains: "Coach: 훈련 키 l"
  - send: "l"
  - wait_screen_contains: "Cursor: 0,1"
  - send: "?"
  - wait_screen_contains: "Hint: 오른쪽으로 한 칸 더 이동해야 합니다."
  - send: "l"
  - wait_screen_contains: "좋습니다. 손을 홈 포지션에 둔 채 목표 위치에 도착했습니다."
  - send: "q"
assert:
  screen_contains:
    - "Grade: A"
    - "Debrief: grade A, 2 keys"
    - "좋습니다. 손을 홈 포지션에 둔 채 목표 위치에 도착했습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
  key_trace:
    - "l"
    - "?"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "A"
      passed: true
    progress:
      mission_id: "normal-motion-basic-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
