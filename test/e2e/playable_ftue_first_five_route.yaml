id: playable_ftue_first_five_route
command: ["go", "run", "."]
timeout_ms: 45000
terminal:
  width: 120
  height: 40
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - send: "l"
  - wait_ms: 50
  - send: "l"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "부팅 로그에서 WARN 줄을 놓쳤습니다"
  - send: "j"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "표시 지점을 오른쪽으로 지나쳤습니다"
  - send: "h"
  - wait_ms: 50
  - send: "h"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "로그를 한 줄 더 내려가 버렸습니다"
  - send: "k"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "enter"

  - wait_screen_contains: "입력 모드에 커서가 묶였습니다"
  - send: "esc"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "이 변경은 버려도 되니 저장하지 않고 command-line에서 나가세요"
  - send: ":"
  - wait_screen_contains: "명령: 입력 후 enter 실행"
  - send: "q"
  - wait_ms: 30
  - send: "!"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: ":q!는 저장하지 않는다는 판단"
  - send: "enter"

  - wait_screen_contains: "변경을 남긴 채 세션을 닫아야 하니 저장 후 종료하세요"
  - send: ":"
  - wait_screen_contains: "명령: 입력 후 enter 실행"
  - send: "w"
  - wait_ms: 30
  - send: "q"
  - wait_ms: 30
  - send: "enter"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "enter"

  - wait_screen_contains: "라우팅 설정 한 줄에서 backend로 바로 이동해야 합니다"
  - send: "w"
  - wait_ms: 50
  - send: "w"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "enabled까지 지나쳤습니다"
  - send: "b"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "backend 토큰이 정확히 끝나는 지점을 확인해야 합니다"
  - send: "e"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "파일 맨 위 선언부"
  - send: "g"
  - wait_ms: 50
  - send: "g"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "파일 마지막 줄에 현재 상태가 적혀 있습니다"
  - send: "G"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "현재 줄의 키 이름을 다시 확인"
  - send: "0"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "현재 줄의 마지막 토큰 끝을 확인해야 합니다"
  - send: "$"
  - wait_screen_contains: "다음 튜토리얼: enter"
  - send: "enter"

  - wait_screen_contains: "라우트 이름에 i가 하나 더 들어갔습니다"
  - send: "x"
  - wait_screen_contains: "x는 작은 오타를 빠르게 치울 때"
  - send: "q"
assert:
  screen_contains:
    - "ADVIMTURE | Tutorial | Tutorial 3: 작은 수정"
    - "Tutorial 3: 작은 수정"
    - "Exercise: 1/7"
    - "RUNBOOK SEALED"
    - "이번 복구: grade S, 1 keys"
    - "x는 작은 오타를 빠르게 치울 때"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
    - "\"normal-motion-basic-004\""
    - "\"survival-save-quit-001\""
    - "\"survival-save-quit-003\""
    - "\"word-motion-basic-001\""
    - "\"whole-file-navigation-004\""
    - "\"single-char-edit-001\""
  app_state:
    buffer: ["api"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "single-char-edit-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_screen_timeline: true
  save_screen_final: true
  save_key_trace: true
  save_summary: true
  save_app_state: true
  save_progress: true
