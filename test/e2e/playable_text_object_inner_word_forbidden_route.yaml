id: playable_text_object_inner_word_forbidden_route
command: ["go", "run", "."]
timeout_ms: 30000
terminal:
  width: 110
  height: 34
setup:
  home: temp
  complete_before: text-object-inner-word-001
steps:
  - wait_screen_contains: "mode 값 중간에 커서가 멈췄습니다"
  - send: "b"
  - wait_screen_contains: "다시 시도: r 또는 enter"
  - send: "enter"
  - wait_screen_contains: "TOOLS    입력 3/3 · 기억할 명령: diw"
  - send: "d"
  - wait_ms: 50
  - send: "i"
  - wait_ms: 50
  - send: "w"
  - wait_ms: 50
  - wait_screen_contains: "다음 단계: enter"
  - send: "q"
assert:
  screen_contains:
    - "RECOVERY CHECK"
    - "다음 행동  다시 시도: r 또는 enter"
    - "이번 복구: grade A"
    - "좋습니다. diw로 현재 단어 전체를 바로 제거했습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"text-object-inner-word-001\""
  key_trace:
    - "b"
    - "enter"
    - "d"
    - "i"
    - "w"
    - "q"
  app_state:
    buffer: ["mode="]
    cursor:
      row: 0
      col: 4
    mode: "normal"
    status: "succeeded"
    progress:
      mission_id: "text-object-inner-word-001"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
