id: playable_hjkl_success
command: ["env", "ADVIMTURE_PLAYABLE_SLICE=1", "go", "run", "."]
timeout_ms: 8000
terminal:
  width: 100
  height: 30
setup:
  home: temp
steps:
  - wait_screen_contains: "Reach the marked column."
  - wait_ms: 200
  - send: "l"
  - wait_ms: 100
  - send: "l"
  - wait_screen_contains: "Door opened."
  - send: "q"
assert:
  screen_contains:
    - "Door opened."
    - "Grade: S"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"mission-1\""
    - "\"best_grade\": \"S\""
  key_trace:
    - "l"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "mission-1"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
