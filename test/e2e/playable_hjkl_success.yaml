id: playable_hjkl_success
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
steps:
  - wait_screen_contains: "터미널 지도에서 목표 문자까지 커서를 이동하세요."
  - wait_ms: 200
  - send: "l"
  - wait_ms: 100
  - send: "l"
  - wait_screen_contains: "좋습니다. 손을 홈 포지션에 둔 채 목표 위치에 도착했습니다."
  - send: "q"
assert:
  screen_contains:
    - "좋습니다. 손을 홈 포지션에 둔 채 목표 위치에 도착했습니다."
    - "Tutorial 0: 커서 감각 회상"
    - "Exercise: 1/4"
    - "Grade: S"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"normal-motion-basic-001\""
    - "\"best_grade\": \"S\""
  key_trace:
    - "l"
    - "l"
    - "q"
  app_state:
    buffer: ["abc"]
    cursor:
      row: 0
      col: 2
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "normal-motion-basic-001"
      completed: true
    ui:
      focus_panel:
        kind: "success"
        title: "STEP SEALED"
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_screen_final: true
  save_key_trace: true
  save_summary: true
