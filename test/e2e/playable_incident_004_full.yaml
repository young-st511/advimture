id: playable_incident_004_full
command: ["go", "run", "."]
timeout_ms: 30000
terminal:
  width: 120
  height: 38
setup:
  home: temp
  complete_before: incident-linewise-001
steps:
  - wait_screen_contains: "config runbook에 block 표식"
  - send: "/"
  - wait_ms: 50
  - send: "b"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - send: "o"
  - wait_ms: 50
  - send: "c"
  - wait_ms: 50
  - send: "k"
  - wait_ms: 50
  - send: "enter"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "unsafe 줄 두 개"
  - send: "V"
  - wait_screen_contains: "Selection: linewise 1,0 -> 1,10"
  - send: "j"
  - wait_screen_contains: "Selection: linewise 1,0 -> 2,11"
  - send: "d"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "검증된 route 줄"
  - send: "V"
  - wait_screen_contains: "Selection: linewise 0,0 -> 0,12"
  - send: "y"
  - wait_ms: 50
  - send: "j"
  - wait_ms: 50
  - send: "p"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "파일 끝까지 stale tail"
  - send: "V"
  - wait_screen_contains: "Selection: linewise 1,0 -> 1,8"
  - send: "G"
  - wait_screen_contains: "Selection: linewise 1,0 -> 2,11"
  - send: "d"
  - wait_screen_contains: "다음 단계: enter"
  - send: "enter"

  - wait_screen_contains: "블록 정리 후에도 hold 상태"
  - send: ":"
  - wait_ms: 50
  - send: "%"
  - wait_ms: 50
  - send: "s"
  - wait_ms: 50
  - send: "/"
  - wait_ms: 50
  - send: "h"
  - wait_ms: 50
  - send: "o"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - send: "d"
  - wait_ms: 50
  - send: "/"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - send: "i"
  - wait_ms: 50
  - send: "v"
  - wait_ms: 50
  - send: "e"
  - wait_ms: 50
  - send: "/"
  - wait_ms: 50
  - send: "g"
  - wait_ms: 50
  - send: "enter"
  - wait_screen_contains: "다음 runbook: enter"
  - send: "q"
