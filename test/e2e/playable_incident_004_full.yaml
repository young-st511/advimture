  screen_contains:
    - "릴레이 기지 004: config block 복구"
    - "Exercise: 5/5"
    - "다음 runbook: enter"
    - "잔류 리스크: 줄 묶음 복구 범위 판별: 미복구"
    - "좋습니다. 남은 hold 상태를 전체 범위에서 live로 승격해 config block 복구 runbook을 닫았습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"incident-linewise-001\""
    - "\"incident-linewise-002\""
    - "\"incident-linewise-003\""
    - "\"incident-linewise-004\""
    - "\"incident-linewise-005\""
  key_trace:
    - "/"
    - "b"
    - "l"
    - "o"
    - "c"
    - "k"
    - "enter"
    - "enter"
    - "V"
    - "j"
    - "d"
    - "enter"
    - "V"
    - "y"
    - "j"
    - "p"
    - "enter"
    - "V"
    - "G"
    - "d"
    - "enter"
    - ":"
    - "%"
    - "s"
    - "/"
    - "h"
    - "o"
    - "l"
    - "d"
    - "/"
    - "l"
    - "i"
    - "v"
    - "e"
    - "/"
    - "g"
    - "enter"
    - "q"
