    buffer: ["live pump", "live relay"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    command: ":%s/hold/live/g"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "incident-linewise-005"
      completed: true
