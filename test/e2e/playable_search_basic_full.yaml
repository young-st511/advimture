  - send: "o"
  - wait_ms: 50
  - send: "u"
  - wait_ms: 50
  - send: "t"
  - wait_ms: 50
  - send: "enter"
  - wait_ms: 50
  - send: "n"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "첫 retry 안쪽에 커서"
  - send: "/"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "e"
  - wait_ms: 50
  - send: "t"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "y"
  - wait_ms: 50
  - send: "enter"
  - wait_ms: 50
  - send: "N"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "커서는 파일 끝에 있지만 alarm"
  - send: "/"
  - wait_ms: 50
  - send: "a"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - send: "a"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "m"
  - wait_ms: 50
  - send: "enter"
  - wait_ms: 50
  - wait_screen_contains: "Playlist complete"
  - send: "q"
assert:
  screen_contains:
    - "Mid Tutorial: Literal search"
    - "Exercise: 4/4"
    - "Playlist complete"
    - "좋습니다. 검색이 문서 위쪽으로 wrap되어 alarm을 찾았습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"search-basic-001\""
    - "\"search-basic-002\""
    - "\"search-basic-003\""
    - "\"search-basic-004\""
