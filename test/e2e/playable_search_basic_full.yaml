steps:
  - wait_screen_contains: "부팅 로그 아래쪽에 error"
  - send: "/"
  - wait_ms: 50
  - send: "e"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "o"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "enter"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "timeout이 두 번 보입니다"
  - send: "/"
  - wait_ms: 50
  - send: "t"
  - wait_ms: 50
  - send: "i"
  - wait_ms: 50
  - send: "m"
  - wait_ms: 50
  - send: "e"
