  - send: "enter"

  - wait_screen_contains: "첫 retry 안쪽에 커서"
  - send: "/"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "e"
  - wait_ms: 50
  - send: "t"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "y"
  - wait_ms: 50
  - send: "enter"
  - wait_ms: 50
  - send: "N"
  - wait_ms: 50
  - wait_screen_contains: "Next: enter"
  - send: "enter"

  - wait_screen_contains: "커서는 파일 끝에 있지만 alarm"
  - send: "/"
  - wait_ms: 50
  - send: "a"
  - wait_ms: 50
  - send: "l"
  - wait_ms: 50
  - send: "a"
  - wait_ms: 50
  - send: "r"
  - wait_ms: 50
  - send: "m"
  - wait_ms: 50
  - send: "enter"
