assert:
  screen_contains:
    - "Mid Tutorial: Literal search"
    - "Exercise: 4/4"
    - "Next tutorial: enter"
    - "좋습니다. 검색이 문서 위쪽으로 wrap되어 alarm을 찾았습니다."
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"search-basic-001\""
    - "\"search-basic-002\""
    - "\"search-basic-003\""
    - "\"search-basic-004\""
  key_trace:
    - "/"
    - "e"
    - "r"
    - "r"
    - "o"
    - "r"
    - "enter"
    - "enter"
    - "/"
    - "t"
    - "i"
    - "m"
    - "e"
    - "o"
    - "u"
    - "t"
    - "enter"
    - "n"
    - "enter"
    - "/"
    - "r"
    - "e"
    - "t"
    - "r"
    - "y"
    - "enter"
    - "N"
    - "enter"
    - "/"
    - "a"
    - "l"
    - "a"
    - "r"
    - "m"
    - "enter"
    - "q"
  app_state:
    buffer: ["alarm root", "ok", "tail"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    status: "succeeded"
    score:
      grade: "S"
      passed: true
    progress:
      mission_id: "search-basic-004"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
