id: playable_command_quit
command: ["go", "run", "."]
timeout_ms: 20000
terminal:
  width: 100
  height: 30
setup:
  home: temp
  complete_before: survival-save-quit-002
steps:
  - wait_screen_contains: "MISSION  실험 파일 버리고 나가기"
  - send: ":"
  - wait_screen_contains: "COMMAND  :"
  - wait_ms: 100
  - send: "q"
  - wait_ms: 50
  - send: "!"
  - wait_ms: 50
  - send: "enter"
  - wait_screen_contains: ":q!는 저장하지 않는다는 판단"
  - send: "q"
assert:
  screen_contains:
    - "Tutorial 1: Vim 생존 키트"
    - "Exercise: 2/3"
    - ":q!는 저장하지 않는다는 판단"
  exit_code: 0
  progress_file_exists: true
  progress_file_contains:
    - "\"survival-save-quit-002\""
  key_trace:
    - ":"
    - "q"
    - "!"
    - "enter"
    - "q"
  app_state:
    buffer: ["throwaway draft"]
    cursor:
      row: 0
      col: 0
    mode: "normal"
    command: ":q!"
    status: "succeeded"
    progress:
      mission_id: "survival-save-quit-002"
      completed: true
evidence:
  save_raw_ansi: true
  save_clean_screen: true
  save_key_trace: true
  save_summary: true
