    cursor_row: 0
    cursor_col: 0
    goal:
      type: text_match
      text: "hello vim"
    hints:
      - "cw 로 단어를 바꿀 수 있어요."
      - "$ 로 끝으로 이동 후 cw 를 사용하세요."
