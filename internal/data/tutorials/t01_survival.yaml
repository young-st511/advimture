id: "1-1"
title: "생존 기초"
description: "Vim에서 살아남는 최소한의 기술: 종료, 입력, 저장"
substeps:
  - id: "1-1-1"
    title: ":q! 로 탈출하기"
    instruction: ":q! 를 입력하여 Vim을 종료하세요."
    initial_text: "Welcome to the server.\nThis file should not be modified."
    cursor_row: 0
    cursor_col: 0
    goal:
      type: save_quit
    hints:
      - ": 를 먼저 눌러 명령 모드에 진입하세요."
      - ":q! 를 입력하고 Enter를 누르세요."
      - "차례대로: : → q → ! → Enter"
    mentor_msg: "당황하지 마. : 를 누르면 명령을 입력할 수 있어."
    allowed_keys: [":", "q", "!", "enter", "backspace", "esc"]

  - id: "1-1-2"
    title: "Insert 모드 진입과 탈출"
    instruction: "i 를 눌러 Insert 모드에 진입한 후, Esc 를 눌러 Normal 모드로 돌아오세요."
    initial_text: "hello world"
    cursor_row: 0
    cursor_col: 0
    goal:
      type: command_used
      cmd: "esc_from_insert"
    hints:
      - "i 키를 누르면 INSERT 모드에 진입해요."
      - "Esc 키를 누르면 NORMAL 모드로 돌아와요."
      - "i 를 누르고, Esc 를 누르세요."
    mentor_msg: "i 로 글을 쓰고, Esc 로 돌아오는 게 기본이야."

  - id: "1-1-3"
    title: "텍스트 입력 후 저장"
    instruction: "'hello'를 'hello vim'으로 수정하고 :wq 로 저장하세요."
    initial_text: "hello"
    cursor_row: 0
    cursor_col: 0
    goal:
      type: save_quit
      text: "hello vim"
    hints:
      - "먼저 A 를 눌러 줄 끝에서 입력을 시작하세요."
      - "A 를 누르고 ' vim'을 타이핑한 후 Esc → :wq → Enter"
      - "A →  vim → Esc → :wq → Enter"
    mentor_msg: "A 는 줄 끝에서 입력을 시작하는 명령이야."

  - id: "1-1-4"
    title: "미니 챌린지: 설정 파일 수정"
    instruction: "'port=8080'을 'port=3000'으로 수정하고 저장하세요."
    initial_text: "# Server Config\nhost=localhost\nport=8080\ndebug=false"
    cursor_row: 0
    cursor_col: 0
    goal:
      type: save_quit
      text: "# Server Config\nhost=localhost\nport=3000\ndebug=false"
    hints:
      - "j 키로 port 줄까지 이동하세요."
      - "f8 로 '8'을 찾고, cw 로 단어를 변경하세요."
      - "jjf8cw3000 → Esc → :wq → Enter"
    mentor_msg: "실전에서 설정 파일을 수정하는 건 자주 있는 일이야."
